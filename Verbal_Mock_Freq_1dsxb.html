
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRE Verbal 빈출 문제 모의고사 1회</title>
<style>
:root{
  --bg:#f7f5f0; --paper:#fff; --ink:#1a1a1a; --ink-soft:#555; --ink-mute:#888;
  --line:#d8d4ca; --line-soft:#e8e5dd; --accent:#1f3a5f; --accent-soft:#e8eef5;
  --correct:#2d6a4f; --wrong:#b03a2e; --warn:#c0392b; --highlight:#fff3a8;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  --ui:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  --serif:'Iowan Old Style','Palatino','Georgia','Noto Serif KR',serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--ink);font-family:var(--serif);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh;}
body{background-image:radial-gradient(circle at 20% 10%,rgba(31,58,95,.03) 0,transparent 50%),radial-gradient(circle at 80% 90%,rgba(31,58,95,.03) 0,transparent 50%);}
.ui{font-family:var(--ui);}

/* topbar */
.topbar{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);padding:12px 26px;display:flex;align-items:center;justify-content:space-between;font-family:var(--ui);}
.topbar-left{font-size:13px;color:var(--ink-soft);}
.topbar-left .label{color:var(--ink-mute);margin-right:6px;} .topbar-left .value{color:var(--ink);font-weight:600;}
.timer{font-family:'SF Mono','Menlo',monospace;font-size:21px;font-weight:600;color:var(--accent);letter-spacing:.05em;padding:5px 13px;background:var(--accent-soft);border-radius:4px;min-width:104px;text-align:center;}
.timer.warning{color:var(--warn);background:#fdecea;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.progress-bar{height:3px;background:var(--line-soft);} .progress-fill{height:100%;background:var(--accent);transition:width .3s;}

main{max-width:1120px;margin:0 auto;padding:30px 26px 120px;}

/* buttons */
.btn{font-family:var(--ui);font-size:14px;font-weight:500;padding:11px 22px;border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:5px;cursor:pointer;transition:all .15s;}
.btn:hover:not(:disabled){border-color:var(--ink);background:#fafaf7;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover:not(:disabled){background:#15294a;border-color:#15294a;}
.btn-finish{background:var(--correct);color:#fff;border-color:var(--correct);}
.btn-finish:hover:not(:disabled){background:#1d4d39;}
.btn-large{font-size:16px;padding:14px 38px;}

/* ===== INTRO (1-viewport) ===== */
.intro{max-width:640px;margin:34px auto;text-align:center;}
.intro-eyebrow{font-family:var(--ui);font-size:13px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:14px;}
.intro-title{font-family:var(--serif);font-size:2.2em;font-weight:700;line-height:1.3;letter-spacing:-.01em;}
.intro-round{font-size:1.1em;font-style:italic;color:var(--ink-soft);margin-top:4px;}
.main-copy{background:linear-gradient(180deg,#fbfaf6,#f3f0e8);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:10px;padding:18px 24px;margin:20px auto;max-width:560px;font-size:1.18em;font-weight:600;line-height:1.5;color:var(--accent);}
.author{font-size:1.05em;font-weight:500;color:var(--ink-soft);margin-bottom:18px;letter-spacing:.02em;white-space:pre-wrap;}
.intro-info{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:18px 26px;max-width:600px;margin:0 auto 16px;text-align:left;box-shadow:var(--shadow);}
.intro-info .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line-soft);font-family:var(--ui);font-size:14px;}
.intro-info .row:last-child{border-bottom:none;}
.intro-info .k{color:var(--ink-mute);} .intro-info .v{color:var(--ink);font-weight:500;}
.intro-note{max-width:600px;margin:0 auto 18px;text-align:left;font-family:var(--ui);font-size:.92em;color:var(--ink-soft);line-height:1.7;}
.intro-note ul{padding-left:20px;} .intro-note li{margin-bottom:3px;}

/* section intro / end */
.card-center{max-width:580px;margin:54px auto;text-align:center;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:46px 44px;box-shadow:var(--shadow);}
.card-center .num{font-family:var(--ui);font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:16px;}
.card-center h2{font-family:var(--serif);font-size:2.1em;font-weight:700;margin-bottom:20px;}
.card-center .meta{font-family:var(--ui);font-size:15px;color:var(--ink-soft);margin-bottom:30px;line-height:1.8;}
.card-center .meta strong{color:var(--ink);}
.warn-box{background:#fdf6ec;border:1px solid #f0d9b5;border-radius:8px;padding:16px 18px;margin:0 auto 26px;max-width:460px;font-family:var(--ui);font-size:14px;color:#92400e;line-height:1.7;}
.end-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

/* question */
.question-meta{font-family:var(--ui);font-size:12px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.14em;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.question-meta .qtype{background:var(--ink);color:var(--paper);padding:3px 10px;border-radius:3px;font-size:11px;}
.layout-rc{display:grid;grid-template-columns:1.05fr 1fr;gap:34px;align-items:start;}
.passage{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;padding:24px 28px;font-size:15.5px;line-height:1.82;box-shadow:var(--shadow);}
@media(min-width:769px){.passage{position:sticky;top:82px;max-height:calc(100vh - 108px);overflow-y:auto;}}
.passage::-webkit-scrollbar{width:8px;} .passage::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
.passage-label{display:inline-block;font-family:var(--ui);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--accent);padding:3px 10px;border-radius:4px;margin-bottom:14px;}
.qnum-badge{display:inline-block;font-family:var(--ui);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--accent);padding:3px 10px;border-radius:4px;margin-bottom:16px;}
.passage p{margin-bottom:12px;text-align:justify;} .passage p:last-child{margin-bottom:0;}
.highlighted{background:var(--highlight);padding:1px 2px;border-radius:2px;}
.passage .sentence{cursor:pointer;padding:0 1px;border-radius:2px;transition:background .12s;}
.passage .sentence:hover{background:rgba(31,58,95,.12);}
.passage .sentence:focus{outline:2px solid var(--accent);outline-offset:1px;}
.passage .sentence.sel{background:#bcd6f0;box-shadow:inset 0 -2px 0 var(--accent);}
.rev-sent-correct{background:#cde8d8;padding:0 1px;border-radius:2px;} .rev-sent-wrong{background:#f6cfca;padding:0 1px;border-radius:2px;}
.question-body{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:28px 32px;box-shadow:var(--shadow);}
.question-text{font-size:16.5px;line-height:1.7;margin-bottom:22px;font-weight:500;}
.directions{font-family:var(--ui);font-size:13.5px;color:var(--ink-soft);font-style:italic;margin-bottom:16px;}

/* choices markers */
.choices{list-style:none;}
.choice{display:flex;gap:13px;align-items:flex-start;padding:9px 6px;margin-bottom:2px;border:none;border-radius:0;cursor:pointer;transition:background .12s;font-size:15.5px;line-height:1.55;}
.choice:hover{background:#faf9f4;}
.choice .mk{flex-shrink:0;margin-top:3px;border:2px solid var(--ink-mute);background:#fff;transition:all .12s;}
.choice.oval .mk{width:24px;height:15px;border-radius:50%;}
.choice.square .mk{width:16px;height:16px;border-radius:3px;}
.choice.selected{background:var(--accent-soft);border-radius:6px;}
.choice.selected .mk{border-color:var(--accent);background:var(--accent);}
.se-hint{font-family:var(--ui);font-size:13px;color:var(--ink-mute);margin-bottom:10px;}
.se-warning{font-family:var(--ui);font-size:13px;color:var(--warn);margin-top:12px;padding:8px 12px;background:#fdecea;border-radius:4px;display:none;}
.se-warning.show{display:block;}

/* TC table */
.tc-table{border-collapse:collapse;margin-top:6px;width:100%;max-width:560px;}
.tc-table th{font-family:var(--ui);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:700;border:1px solid var(--line);padding:9px 8px;background:#fafaf7;text-align:center;}
.tc-table td{border:1px solid var(--line);padding:12px 16px;cursor:pointer;font-size:15px;transition:all .1s;}
.tc-table td:hover{background:#faf9f4;}
.tc-table td.selected{background:var(--accent-soft);font-weight:600;box-shadow:inset 0 0 0 2px var(--accent);}
.tc-table.single{max-width:430px;}

/* footer nav */
.footer-nav{position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:1px solid var(--line);padding:14px 26px;display:flex;justify-content:space-between;align-items:center;z-index:5;box-shadow:0 -2px 10px rgba(0,0,0,.03);}
.footer-nav .nav-group{display:flex;gap:10px;}

/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;}
.modal-backdrop.show{display:flex;}
.modal{background:var(--paper);border-radius:8px;padding:34px 38px;max-width:460px;width:90%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.2);}
.modal h3{font-size:20px;margin-bottom:14px;font-weight:600;}
.modal p{font-family:var(--ui);font-size:14.5px;color:var(--ink-soft);margin-bottom:26px;line-height:1.6;}
.modal .modal-actions{display:flex;gap:10px;justify-content:center;}

/* results */
.results{max-width:1000px;margin:0 auto;}
.results-header{text-align:center;margin-bottom:34px;}
.results-header .eyebrow{font-family:var(--ui);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:14px;}
.results-header h2{font-family:var(--serif);font-size:2.2em;font-weight:700;}
.score-card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:34px;margin-bottom:22px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;text-align:center;box-shadow:var(--shadow);}
.score-cell .label{font-family:var(--ui);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:10px;}
.score-cell .value{font-size:46px;font-weight:300;color:var(--accent);line-height:1;}
.score-cell .value .total{font-size:21px;color:var(--ink-mute);}
.score-cell .sub{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft);margin-top:8px;}
.meta-notice{background:#fafaf7;border:1px solid var(--line-soft);border-radius:8px;padding:12px 16px;font-family:var(--ui);font-size:.9em;color:var(--ink-soft);line-height:1.6;margin-bottom:18px;}
.exp-controls{display:flex;gap:10px;justify-content:flex-end;margin-bottom:10px;}
.results-table{background:var(--paper);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:28px;box-shadow:var(--shadow);}
.results-table table{width:100%;border-collapse:collapse;font-family:var(--ui);font-size:14px;}
.results-table th{background:#fafaf7;padding:13px 14px;text-align:left;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);font-weight:600;border-bottom:1px solid var(--line);}
.results-table td{padding:12px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
.results-table tr.section-divider td{background:var(--accent-soft);color:var(--accent);font-weight:600;font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
.mark-correct{color:var(--correct);font-weight:700;} .mark-wrong{color:var(--wrong);font-weight:700;} .mark-skip{color:var(--ink-mute);}
.exp-toggle{font-family:var(--ui);font-size:12.5px;color:var(--accent);background:none;border:1px solid var(--line);border-radius:5px;padding:5px 10px;cursor:pointer;}
.exp-toggle:hover{background:var(--accent-soft);}
.m-pool{font-family:var(--ui);font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.tier{display:inline-block;font-family:var(--ui);font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.tier-top{background:#b8860b;color:#fff;} .tier-high{background:var(--accent);color:#fff;}
.tier-mid{background:#6b7a8f;color:#fff;} .tier-low{background:#e8e5dd;color:var(--ink-soft);}
.tier-legend{font-family:var(--ui);font-size:12px;color:var(--ink-soft);margin-bottom:14px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;}

/* explanation 2-col */
.exp-row td{padding:0 !important;background:#fbfaf6;border-bottom:2px solid var(--line);}
.exp-wrap{padding:22px 22px;}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start;}
.exp-col-title{font-family:var(--ui);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:12px;border-bottom:1px solid var(--line-soft);padding-bottom:6px;}
.rev-passage{background:#fff;border:1px solid var(--line-soft);border-left:3px solid var(--accent);border-radius:6px;padding:16px 18px;font-size:14.5px;line-height:1.75;margin-bottom:14px;}
.rev-stem{font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.6;}
.rev-choice{display:flex;gap:10px;align-items:flex-start;padding:8px 12px;border:1px solid var(--line-soft);border-radius:6px;margin-bottom:6px;font-size:14px;line-height:1.5;}
.rev-choice .rc-let{font-family:var(--ui);font-weight:700;color:var(--ink-mute);min-width:18px;}
.rev-choice.is-correct{background:#eaf5ef;border-color:var(--correct);}
.rev-choice.is-wrong{background:#fdeeec;border-color:var(--wrong);}
.rev-tag{font-family:var(--ui);font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:auto;white-space:nowrap;}
.rev-tag.t-correct{background:var(--correct);color:#fff;} .rev-tag.t-mine{background:var(--wrong);color:#fff;}
.rev-blank{font-size:14px;margin-bottom:8px;padding:8px 12px;border:1px solid var(--line-soft);border-radius:6px;}
.rev-blank .bl{font-family:var(--ui);font-weight:700;color:var(--ink-mute);font-size:12px;}
.ans-ok{color:var(--correct);font-weight:600;} .ans-no{color:var(--wrong);font-weight:600;}

.exp-meta{background:var(--accent-soft);border-radius:8px;padding:14px 16px;margin-bottom:16px;font-family:var(--ui);font-size:13px;line-height:1.7;}
.exp-meta .m-id{font-size:15px;font-weight:800;color:var(--accent);letter-spacing:.02em;}
.exp-meta .m-cnt{display:inline-block;background:var(--accent);color:#fff;font-weight:700;padding:1px 9px;border-radius:10px;margin-left:6px;font-size:12px;}
.exp-meta .m-row{margin-top:6px;color:var(--ink-soft);}
.exp-meta .m-ans .ans-c{color:var(--correct);font-weight:700;} .exp-meta .m-ans .ans-m{font-weight:700;}
.exp-sec{margin-bottom:13px;}
.exp-sec h4{font-family:var(--ui);font-size:12.5px;font-weight:700;color:var(--accent);margin-bottom:4px;letter-spacing:.02em;}
.exp-sec p,.exp-sec li{font-size:14px;line-height:1.65;color:var(--ink);}
.exp-sec ul{padding-left:4px;list-style:none;} .exp-sec li{margin-bottom:5px;}
.exp-sec li b{color:var(--ink);}
.exp-uncertain{color:var(--warn);font-weight:700;font-family:var(--ui);font-size:12.5px;margin-top:6px;}

@media(max-width:768px){
  .layout-rc{grid-template-columns:1fr;}
  .passage{position:static !important;max-height:none !important;overflow-y:visible !important;top:auto !important;}
  .score-card{grid-template-columns:1fr;gap:18px;}
  .exp-grid{grid-template-columns:1fr;gap:18px;}
  main{padding:22px 14px 120px;} .intro-title{font-size:1.8em;}
}
@media print{.footer-nav,.topbar,.exp-controls,.results-actions{display:none;}body{background:#fff;}}
</style>
</head>

낮춘다는 결론을 약화하지 않는다."}, "uncertain": false}, "S1-Q2": {"interp": "필자는 ‘미국이 배출보다 더 많은 CO₂를 흡수하는 것은 환경 보호 노력의 결과가 아니라, 과거 벌목으로 생긴 어린 숲(흡수 효율이 높음) 때문’이라고 주장한다.", "strat": "RC 유형 &gt; 추론(약화). 단일 지문 내 논증을 약화하는 보기를 고르는 문항 — ‘보호 노력이 원인이 아니다’를 뒤집는 보기를 찾는다.", "correct": "(B) 미국이 최근 수십 년간 화석연료 연소로 인한 CO₂ 배출을 ‘의도적으로’ 줄여 왔다면, 흡수&gt;배출이라는 결과의 일부는 ‘의도적 보호 노력(배출 감축)’ 덕분이 된다. 곧 ‘보호 노력의 결과가 아니다’라는 주장을 약화한다.", "wrong": {"A": "비화석 에너지 ‘소비 증가’는 총배출 감소를 보장하지 않는다(추가 에너지일 수 있음). 배출 감축을 직접 말하는 (B)보다 약화력이 약하다.", "C": "입장(stance) 변화는 구체적 효과가 없는 모호한 진술이어서 흡수&gt;배출의 원인을 보호 노력으로 돌리지 못한다.", "D": "CO₂가 유일한 배출 기체가 아니라는 사실은 논점(흡수 대 배출의 원인)과 무관하다.", "E": "대기 중 CO₂의 출처 비중에 관한 진술로, 보호 노력 여부와 관련이 없다."}, "uncertain": false}, "S1-Q3": {"interp": "필자는 ‘숲의 흡수량 &gt; 화석연료 배출량’이라는 자료로 ‘미국이 대기 CO₂ 상승에 직접 기여하지 않을 수 있다’고 추론한다.", "strat": "CR 8유형 &gt; 전제(Assumption). ‘배출=화석연료 연소’로 등치할 때 비로소 흡수&gt;배출 비교가 성립 — 숨은 전제를 찾는다.", "correct": "(A) 미국이 화석연료 연소 ‘외의’ 출처에서는 의미 있는 양의 CO₂를 내지 않는다고 가정해야, 화석연료 배출만으로 ‘배출 총량’을 대표할 수 있어 논증이 성립한다.", "wrong": {"B": "배출이 최근 증가하지 않았다는 것은 논증 성립에 필요한 전제가 아니다(흡수와의 비교에 불필요).", "C": "미국과 타국의 화석연료 배출량 비교는 본 논증의 전제와 무관하다."}, "uncertain": false}, "S1-Q4": {"interp": "지문은 Manton의 견해(절지동물 세 집단이 독립적으로 진화 → 공통 형질은 수렴진화)를 소개한 뒤, 곤충·갑각류의 눈 신경계 유사성으로 반박하고, 협각류의 차이로는 부분적으로 지지한다.", "strat": "RC 8유형 &gt; 주제와 구성(primary purpose). 한 견해를 제시하고 증거로 ‘평가’하는 구조.", "correct": "(B) 여러 절지동물의 진화에 관한 한 ‘설명(account)’을 제시하고 증거로 평가(일부 반박·일부 지지)하므로 ‘evaluate an account’가 목적이다.", "wrong": {"A": "곤충·갑각류와 협각류의 차이는 세부 근거일 뿐 글 전체 목적이 아니다.", "C": "지문은 수렴진화 사례를 ‘예시’하려는 게 아니라 그 주장을 ‘검증’한다.", "D": "생리적 특징 나열은 논증의 근거이지 목적이 아니다.", "E": "‘대립하는 두 이론의 공통점’을 찾는 글이 아니다 — 하나의 설명을 평가한다."}, "uncertain": false}, "S1-Q5": {"interp": "Manton은 공통 형질(겹눈 등)을 수렴진화로 보지만, 필자는 곤충·갑각류의 눈 신경계가 거의 동일하다는 점에서 ‘공통 조상이 이미 그런 눈을 가졌다’ — 즉 수렴이 아니라고 본다.", "strat": "RC 8유형 &gt; 추론(두 화자의 견해 차이). 일치/불일치 지점을 대조.", "correct": "(C) 곤충·갑각류의 겹눈이 ‘수렴진화의 사례’인가를 두고 둘은 정면으로 엇갈린다(Manton=그렇다 / 필자=아니다).", "wrong": {"A": "둘 다 세 집단이 분절형 벌레에서 유래했다는 데 동의한다 — 불일치 지점이 아니다.", "B": "사지·근육·발생의 차이는 Manton의 전제로, 필자가 반박하지 않는다.", "D": "‘공통 형질이 분절형 벌레에 전혀 없다’는 주장은 지문에서 다투는 지점이 아니다.", "E": "세 집단 중 무엇이 가장 가까운지는 논쟁의 초점이 아니다."}, "uncertain": false}, "S1-Q6": {"interp": "Manton은 세 집단이 ‘독립적으로’ 진화했고 공통 형질은 수렴진화라고 본다. 따라서 그 형질들이 어느 한 공통 조상에 모두 갖춰져 있던 것은 아니라고 믿는다.", "strat": "RC 8유형 &gt; 추론(특정 인물의 견해). 따옴표로 지칭된 ‘shared characteristics’를 본문에서 확인(형광펜).", "correct": "(A) 수렴진화 주장에 따르면 공통 형질은 독립적으로 생긴 것이므로, 세 집단의 ‘어느 단일 조상에도 모두 존재하지는 않는다’가 Manton의 믿음과 일치한다.", "wrong": {"B": "어느 집단이 다른 집단을 낳았는지 판별하는 근거로 본다는 언급은 없다.", "C": "분절형 벌레 기원은 Manton도 인정하지만, 공통 형질이 ‘공통 조상’의 증거라는 것은 그의 수렴진화 주장과 반대다.", "D": "‘가장 강력한 증거’라는 최상급 평가는 지문에 근거가 없다.", "E": "세 집단을 절지동물로 분류하는 것 자체를 부정한다는 내용은 없다."}, "uncertain": false}, "S1-Q7": {"interp": "‘이전 결과가 새 자료 해석에 별 도움이 안 됐다’는 뒤 절이 빈칸의 근거 — 최신 조사 결과가 ‘전례 없는(새로운)’ 것이기 때문이다.", "strat": "18 Triggers &gt; 인과관계(분사구문 ‘being ___’이 뒤 절의 원인). 빈칸=결과의 원인이 되는 ‘전례 없음’.", "correct": "(D) unexampled = 전례 없는. 결과가 전례 없으니 과거 경험이 해석에 무용하다 — 논리가 맞는다.", "wrong": {"A": "superfluous(불필요한): 경험이 무용한 이유로 ‘불필요함’은 어색하다.", "B": "inconsequential(사소한): 사소함은 과거 경험 부재의 근거가 못 된다.", "C": "tedious(지루한): 지루함과 해석 경험 부족은 무관하다.", "E": "familiar(익숙한): 오히려 반대 — 익숙하면 과거 경험이 도움이 됐을 것이다."}, "uncertain": false}, "S1-Q8": {"interp": "확립된 분야의 ‘주변부에 있음’에서 지적 이점이 나올 수 있다 — 곧 ‘외부자(outsider)’ 사고의 중요성. 단 그것이 유일한 사고는 아니라는 단서.", "strat": "18 Triggers &gt; 반복·지칭. (ii)의 사고 종류가 (i)의 위치 개념을 다시 가리킨다 — periphery(주변) ↔ outsider(외부자) 동의 연결.", "correct": "(i) on the periphery of(주변부에) + (ii) outsider(외부자) 사고. 두 빈칸이 ‘바깥에서 보는 관점’으로 일관된다.", "wrong": {"A": "aware of trends in(추세를 앎): ‘주변부’가 아니라 내부 정통 관점에 가깝다.", "B": "deeply indebted to(깊이 의존): 외부자 이점과 반대 방향.", "D": "intuitive(직관적): periphery 위치와 호응하지 않는다.", "E": "arbitrary(자의적): 문맥의 ‘외부자 사고’와 무관하다."}, "uncertain": false}, "S1-Q9": {"interp": "포스트모던 소설이 전통 서사 관습을 ‘전복하려던 대담한 시도’에서 ‘여느 것 못지않게 ___한’ 문체로 ‘퇴락(degenerated)’했고, 직선적 서사를 피하는 방법은 ‘___한’ 수에 그친다.", "strat": "18 Triggers &gt; 대조와 역접 + 빈칸들 사이의 관계. ‘degenerated(퇴락)’가 전체 방향(대담함→진부함, 무한→유한)을 결정.", "correct": "(i) subvert(전복) — 대담한 시도의 내용. (ii) predictable(뻔한) — 퇴락의 결과. (iii) a limited(한정된) — 퇴락했으니 방법도 한정적.", "wrong": {"A": "refine(다듬다): ‘대담한 시도’와 강도가 안 맞고 전복의 의미가 약하다.", "B": "perpetuate(존속시키다): 관습을 ‘이어간다’ — 대담한 시도와 반대.", "E": "inescapable(피할 수 없는): 퇴락=진부함 맥락과 호응하지 않는다.", "F": "comprehensible(이해 가능한): 퇴락의 부정적 뉘앙스를 담지 못한다.", "H": "a variable(가변적인): 한정/퇴락 맥락과 어긋난다.", "I": "an inexhaustible(무한한): 퇴락·한정과 정반대다."}, "uncertain": false}, "S1-Q10": {"interp": "‘두려움(fears)도 희망(hopes=aspirations)도 비현실적이었다’는 뒤 문장이 단서 — 빈칸은 ‘aspirations’와 짝을 이루는 ‘두려움’ 계열.", "strat": "SE 동의어쌍 + 18 Triggers &gt; 반복·지칭(뒤의 ‘fears’가 빈칸을 지칭). 두 단어가 ‘불안’으로 동의여야 한다.", "correct": "trepidation·misgivings = 불안·우려. ‘great ___ and considerable aspirations’ = 두려움과 포부의 대비를 완성한다.", "wrong": {"A": "purpose(목적): 두려움 계열이 아니다.", "B": "talent(재능): 감정(두려움)과 무관하다.", "C": "abilities(능력): 두려움 의미가 없다.", "F": "ambition(야망): ‘aspirations’ 쪽과 겹쳐 ‘fears’ 짝이 못 된다."}, "uncertain": false}, "S1-Q11": {"interp": "컴퓨터를 모델로 삼는 계산심리학자들은 컴퓨터과학의 ‘개념을 가져다(차용)’ 마음을 설명한다.", "strat": "SE 동의어쌍 + 18 Triggers &gt; 인과관계(모델로 삼으니 그 개념을 차용). 두 단어가 ‘차용하다’로 동의.", "correct": "appropriate(차용하다)·borrow(빌리다) = 개념을 가져오다. 문맥과 일치하는 동의어쌍.", "wrong": {"B": "eschew(피하다): 가져온다와 정반대.", "C": "emulate(모방하다): ‘개념 차용’과 의미가 다르고 짝이 없다.", "E": "covet(탐내다): 차용의 의미가 아니다.", "F": "reject(거부하다): 정반대 의미."}, "uncertain": false}, "S1-Q12": {"interp": "콜론 뒤: 새 소설의 ‘꾸밈없는 산문’은 이전의 미로 같은 내면 탐구와 거의 무관하다 → 평소 그녀의 글을 외면하던 이들을 ‘달랠(만족시킬)’ 수 있다.", "strat": "SE 동의어쌍 + 18 Triggers &gt; 콜론(뒤 설명이 빈칸을 규정). 두 단어가 ‘달래다/만족시키다’로 동의.", "correct": "placate·appease = 달래다. 비판자들을 누그러뜨린다는 문맥과 맞는 동의어쌍.", "wrong": {"A": "entice(유혹하다): 의미가 비슷해 보이나 짝(동의어)이 없다.", "B": "gall(짜증나게 하다): 비판자를 달랜다는 흐름과 반대.", "C": "surprise(놀라게 하다): 동의어 짝이 없고 핵심(만족)에서 벗어난다.", "E": "rankle(괴롭히다): gall과 같은 ‘짜증’ 계열로 문맥과 반대."}, "uncertain": false}, "S2-Q1": {"interp": "논증: ABS(잠김방지제동)는 미끄러짐을 줄이고, 충돌은 흔히 미끄러짐에서 비롯되므로, 위험 상황에서 급정거하는 운전자의 충돌 가능성을 ABS가 줄인다.", "strat": "CR 8유형 &gt; 강화(Strengthen). ‘ABS 차 운전자가 원래 더 조심스러워서 충돌이 적다’는 대안 설명을 배제하면 강화.", "correct": "(E) ABS 없는 택시 운전자가 위험 상황을 ‘더’ 피하는데도 충돌률이 ABS 택시와 ‘같다’ — 운전자 성향(조심성)을 통제하면 ABS가 충돌을 줄인다는 인과를 강화한다.", "wrong": {"A": "대부분의 미끄러짐이 충돌로 이어지지 않는다면 ABS의 충돌 감소 효과는 오히려 약화된다.", "B": "숙련 운전자는 ABS 없이도 미끄러짐을 막는다 → ABS의 필요성을 약화한다.", "C": "ABS 구매자가 원래 조심스러운 운전자라면, 충돌 감소가 ABS가 아니라 성향 때문 — 약화(대안 원인).", "D": "연간 위험 상황 횟수(≤10회)는 빈도 정보일 뿐 인과를 강화하지 않는다."}, "uncertain": false}, "S2-Q2": {"interp": "단독 여행 여성들은 ‘전통적 가치’를 옹호하면서도, 홀로 여행하는 ‘급진적’ 행위를 통해 스스로 해방을 이뤘다 — 이 모순(contradiction)을 본문에서 형광펜으로 표시.", "strat": "RC 8유형 &gt; 구체 내용 파악(따옴표 지칭어 ‘contradiction’). 본문의 해당 어구를 근거로 의미를 특정.", "correct": "(E) ‘여성의 단독 여행은 급진적 행위였지만, 그 여행자들은 대체로 인습적(전통적) 견해를 지녔다’ — 행위와 신념의 모순을 정확히 요약한다.", "wrong": {"A": "고독을 즐겼지만 여행 중 사람들 사이에 있었다는 것은 본문이 말한 모순이 아니다.", "B": "실명 사용 vs 가명은 ‘소설가와의 대비’이지 여행자 내부의 모순이 아니다.", "C": "여성 운동의 급진성 비교는 모순의 핵심이 아니다.", "D": "소설가와 여행자 중 누가 ‘진짜’ 경계를 깼는지로 왜곡한 진술이다."}, "uncertain": false}, "S2-Q3": {"interp": "본문 끝: 고독은 ‘남성의 특권이던 권위를 부여’했지만 동시에 ‘집단행동이나 여성 연대를 가로막았다’.", "strat": "RC 8유형 &gt; 구체 내용 파악(모두 고르기). 본문이 명시한 두 효과를 짚는다.", "correct": "(A) 남성만 누리던 권위를 부여 / (B) 다른 여성과의 연대(동맹) 형성을 막음 — 둘 다 본문에 직접 근거가 있다.", "wrong": {"C": "전통적 가치에 순응하라는 ‘또래 압력을 덜어줬다’는 내용은 본문에 없다(오히려 전통적 가치를 옹호)."}, "uncertain": false}, "S2-Q4": {"interp": "‘시장 나들이가 사교의 장이었다’는 점이 ‘더 멋지게 차려입는 이들을 조롱한 글들에 의해 간접적으로 attested 된다’ — 곧 입증·뒷받침된다(형광펜: attested).", "strat": "RC 유형 &gt; 단어의 의미(in context). ‘attested by texts’ = 텍스트로 입증됨.", "correct": "(A) borne out = 입증되다/뒷받침되다. ‘by texts’와 결합해 ‘자료로 확인된다’는 문맥에 정확히 맞는다.", "wrong": {"B": "made sure of(확실히 해두다): 능동적 ‘확인 조치’ 뉘앙스로 수동적 ‘입증됨’과 다르다.", "C": "proclaimed(선포되다): 공표의 의미로 ‘입증’과 다르다.", "D": "decided(결정되다): 문맥의 ‘뒷받침’과 무관하다.", "E": "vindicated(정당성이 입증되다): ‘혐의·비난에서 벗어남’ 뉘앙스로 단순 입증과 어긋난다."}, "uncertain": false}, "S2-Q5": {"interp": "본문: 시장의 장점은 농민(peasantry) 사이의 인기에 있었고, 교구 교회는 ‘이론상’ 같지만 ‘실제로는’ 시장이 농촌을 소통망에 더 잘 편입시켰다.", "strat": "CR/RC &gt; 추론(reasonably drawn). 본문 진술에서 안전하게 도출되는 결론만 고른다.", "correct": "(A) 교회에서 포고하면 농민이 듣기 어려웠을 것 — 시장의 장점이 ‘농민 접근성’이었음에서 합리적으로 도출. (B) 왕실 행정가들은 농민이 일부 포고 내용을 아는 것을 중요하게 여겼다 — 시장을 택한 이유에서 도출.", "wrong": {"C": "‘시장이 가장(most) 효과적인 수단’이라는 최상급은 과장 — 본문은 교회가 ‘이론상 동등’하다고 했다."}, "uncertain": false}, "S2-Q6": {"interp": "형광펜 문장 ‘빙하기 때 유럽의 숲이 사실상 전멸했다’ — 큰 온전한 숲에 의존하던 새들은 살아남지 못했고, 그래서 ‘오늘날 유럽 명금류가 파편화된 숲에서도 번성한다’는 특징을 설명한다.", "strat": "RC 8유형 &gt; 문장·단락의 기능(언급 목적). 강조 문장이 논증에서 하는 역할을 묻는다.", "correct": "(B) 그 관찰은 ‘유럽 명금류의 독특한 특성(파편 숲에서도 번성)’을 설명하는 데 쓰인다.", "wrong": {"A": "유럽 명금류 개체수가 더 적다는 비교는 본문에 없다.", "C": "유럽에 서식지가 더 적다는 취지가 아니다 — 새의 의존성 변화가 요점.", "D": "‘인간 지배 환경 적응 시간’은 본문의 두 번째 이유로, 이 강조 문장의 역할이 아니다.", "E": "빙하기는 ‘유럽’에서 더 혹독했다 — 북미 지속기간을 강조한다는 진술은 왜곡이다."}, "uncertain": false}, "S2-Q7": {"interp": "큰 온전한 숲에 의존하던 유럽 새들은 빙하기에 사라졌으므로, 살아남아 오늘날 번성하는 유럽 명금류는 ‘큰 온전한 숲에 의존하지 않는’ 새들이다.", "strat": "RC 8유형 &gt; 구체 내용 파악(according to). 본문 사실에서 직접 확인.", "correct": "(A) 오늘날 유럽 이동 명금류는 일반적으로 ‘크고 온전한 숲 덩어리에 의존하지 않는다’ — 본문 논리와 일치.", "wrong": {"B": "추위에 덜 민감하다는 비교는 본문 근거가 없다.", "C": "서식지 차이로 분포가 고르지 않다는 내용은 없다.", "D": "추가 파편화에도 생존이 어렵다 — 파편 숲에서 번성한다는 본문과 반대.", "E": "빙하기 이후 진화한 종이라는 언급은 없다."}, "uncertain": false}, "S2-Q8": {"interp": "콜론 뒤: ‘운동 자체가 우울증의 적절한 치료가 될 수 있다’ → 운동을 다른 치료의 ‘보조물(adjunct)’ 정도로만 봐서는 안 된다.", "strat": "18 Triggers &gt; 콜론(뒤 문장이 빈칸 의미를 규정). ‘not ___’ ↔ ‘itself a remedy(독립 치료)’.", "correct": "(D) an adjunct to = ~의 보조물. ‘운동을 단지 다른 치료의 보조로 봐선 안 된다’ — 운동이 독립 치료가 될 수 있다는 콜론 설명과 맞는다.", "wrong": {"A": "a model for(~의 모범): 문맥(보조/독립 치료)과 무관하다.", "B": "a substitute for(~의 대체): ‘대체로 보면 안 된다’는 ‘운동이 치료가 될 수 있다’는 설명과 모순된다.", "C": "an improvement on(~의 개선판): 비교 우위 진술로 콜론 설명과 호응하지 않는다.", "E": "an impediment to(~의 방해물): 운동을 치료로 본다는 흐름과 정반대."}, "uncertain": false}, "S2-Q9": {"interp": "‘얼음 결정은 순수한 물에서만 자란다’는 앞 절과 대조 — 불순물은 얼음 구조에서 ‘배제되어(rejected)’ 결국 쓸려나간다.", "strat": "18 Triggers &gt; 대조와 역접(‘while’) + 인과(‘swept away’). 순수 물 결정 ↔ 불순물 배제.", "correct": "(C) rejected from = ~에서 배제되다. 순수한 물만 결정이 되니 불순물은 구조에서 밀려나 쓸려나간다 — 인과가 맞는다.", "wrong": {"A": "dispersed throughout(전체에 분산): ‘쓸려나간다’와 호응하지 않는다.", "B": "incorporated into(~에 포함): 순수 물만 결정이 된다는 앞 절과 반대.", "D": "trapped in(~에 갇힘): ‘결국 쓸려나간다’와 모순.", "E": "concealed by(~에 의해 숨겨짐): 배제·제거 흐름과 의미가 다르다."}, "uncertain": false}, "S2-Q10": {"interp": "상대를 극단적이라 규정해 놓고, 정작 자신이 주장한 ‘중간 지대’를 (i)차지하지 못했다 → 온건함의 가식이 얼마나 빨리 (ii)벗겨지는가!", "strat": "18 Triggers &gt; 인과·반복. ‘차지하지 못함(실패)’ → ‘가식이 벗겨짐’으로 이어진다.", "correct": "(i) occupy(차지하다) — 중간 지대를 차지하지 못함. (ii) shed(벗어던지다) — 온건의 가식이 빨리 벗겨짐.", "wrong": {"B": "demarcate(경계 짓다): ‘중간 지대를 차지’하는 행위와 초점이 다르다.", "C": "survey(살피다): 중간 지대를 ‘차지’한다는 문맥과 어긋난다.", "D": "provoked(유발되다): 가식이 ‘벗겨진다’는 흐름과 맞지 않는다.", "E": "abused(남용되다): 가식이 사라지는 의미를 담지 못한다."}, "uncertain": false}, "S2-Q11": {"interp": "용서할 때 우리는 잘못에 대한 ‘비난(condemnation)’은 (i)유지하지만, 정당화될 수 있는 응징적 대응은 (iii)단념한다.", "strat": "18 Triggers &gt; 대조와 역접(‘but’). ‘비난 유지’ ↔ ‘처벌 단념’의 대비가 핵심.", "correct": "(i) retain(유지하다) + (ii) condemnation of(~에 대한 비난) + (iii) forgo(단념하다). ‘잘못은 여전히 잘못이라 보되 처벌은 포기’ — 용서의 정의와 맞는다.", "wrong": {"A": "relinquish(포기하다): 뒤의 ‘but forgo’와 대비가 사라져 ‘유지’가 와야 할 자리에 맞지 않는다.", "B": "regret(후회하다): 비난을 ‘후회’한다는 것은 문맥과 어긋난다.", "D": "leniency toward(~에 대한 관대함): ‘비난을 유지’ 구도와 반대.", "E": "uncertainty about(~에 대한 불확실): 잘못에 대한 태도로 부적절.", "G": "disguise(위장하다): 처벌을 ‘단념’한다는 의미와 다르다.", "I": "initiate(개시하다): 처벌을 ‘시작’ — 용서의 흐름과 정반대."}, "uncertain": false}, "S2-Q12": {"interp": "‘유용한 동물로 여기면서도(despite)’ 농민들은 무침벌을 경제적 자원으로 ‘활용하지(exploit/utilize)’ 않았다.", "strat": "SE 동의어쌍 + 18 Triggers &gt; 대조와 역접(despite). 두 단어가 ‘활용하다’로 동의.", "correct": "exploited·utilized = (자원을) 활용하다. ‘유용하다고 보면서도 활용하지 않았다’는 양보 구조에 맞는 동의어쌍.", "wrong": {"A": "recognized(인정하다): 짝이 없고 ‘유용하다고 여김(regarding as useful)’과 중복된다.", "B": "discounted(경시하다): ‘활용’ 의미가 아니다.", "E": "monopolized(독점하다): 의미가 좁고 동의어 짝이 없다.", "F": "downplayed(축소하다): 활용과 무관하며 discount 계열이다."}, "uncertain": false}, "S2-Q13": {"interp": "‘방대하고 복잡하며 깊이 뿌리내린’ 행정 기구는 통치 ‘수단’으로서 ‘다루기 힘든(unwieldy/cumbersome)’ 것이었다.", "strat": "SE 동의어쌍 + 18 Triggers &gt; 비슷한 말 유도(vast·complex가 빈칸을 유도). 두 단어가 ‘다루기 힘든’으로 동의.", "correct": "unwieldy·cumbersome = 거추장스러운/다루기 힘든. 방대·복잡함이 통치 수단으로서의 불편함으로 이어진다.", "wrong": {"A": "antiquated(구식의): 방대·복잡과 직접 연결되지 않고 짝이 없다.", "B": "efficient(효율적인): 방대·복잡함과 반대 방향.", "C": "modest(작은): ‘vast(방대)’와 모순.", "D": "simple(단순한): ‘complex(복잡)’와 정반대."}, "uncertain": false}, "S2-Q14": {"interp": "콜론 뒤: ‘불은 인간 출현 훨씬 전부터 대륙의 자연 생태의 일부였다’ → 숯 입자를 인간 도래의 지표로 쓰는 것은 ‘잘못된(misguided/unwise)’ 일이다.", "strat": "SE 동의어쌍 + 18 Triggers &gt; 콜론(뒤가 근거). 두 단어가 ‘잘못된/현명치 못한’으로 동의.", "correct": "unwise·misguided = 현명치 못한/잘못된. 자연 산불이 선행하므로 숯=인간지표 가정은 그릇되다는 콜론 근거와 맞는다.", "wrong": {"B": "unnecessary(불필요한): ‘틀렸다’가 아니라 ‘필요 없다’ — 근거(오류)와 결이 다르다.", "C": "fortuitous(우연한): 문맥과 무관하다.", "D": "inessential(비본질적인): unnecessary 계열로 ‘잘못됨’과 다르다.", "E": "ingenious(기발한): 긍정적 의미로 정반대."}, "uncertain": false}, "S2-Q15": {"interp": "‘과정의 객관적 성격을 인정했다’는 단서 → 그의 탈락은 확립된 기준의 ‘공정한(impartial/fair)’ 적용을 통해 일어났다.", "strat": "SE 동의어쌍 + 18 Triggers &gt; 비슷한 말 유도(‘objective’가 빈칸을 유도). 두 단어가 ‘공정한’으로 동의.", "correct": "impartial·fair = 공정한/편향 없는. ‘객관적 과정’이라는 인식과 일관된 동의어쌍.", "wrong": {"A": "assiduous(근면한): 객관성·공정성과 의미가 다르다.", "B": "uncongenial(불쾌한): 부정적이며 ‘공정’과 무관하다.", "D": "fickle(변덕스러운): 객관·공정과 반대.", "F": "erratic(들쭉날쭉한): 일관·공정과 반대."}, "uncertain": false}}};

const TYPE_LABELS={CR:'Critical Reasoning',RC_SINGLE:'Reading Comprehension',RC_MULTI:'Reading Comprehension',RC_SELECT:'Reading Comprehension',TC:'Text Completion',SE:'Sentence Equivalence'};
const ROMAN={i:'(i)',ii:'(ii)',iii:'(iii)'};
const state={screen:'start',sectionIdx:0,questionIdx:0,answers:{},timer:null,timeRemaining:0,sectionLocked:[],timerExpired:[],endExpired:false,expanded:{}};

function curSection(){return examData.sections[state.sectionIdx];}
function curQ(){return curSection().questions[state.questionIdx];}
function totalQ(){return examData.sections.reduce((s,x)=>s+x.questions.length,0);}
function fmt(t){const m=Math.floor(t/60),s=t%60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function isAnswered(id){const a=state.answers[id];return Array.isArray(a)&&a.filter(x=>x!==undefined&&x!=='').length>0;}
function arrEq(a,b){if(!a||!b||a.length!==b.length)return false;const x=[...a].sort(),y=[...b].sort();return x.every((v,i)=>v===y[i]);}
function normSent(s){if(typeof s!=='string')return '';return s.replace(/<[^>]+>/g,' ').replace(/[‘’]/g,"'").replace(/[“”]/g,'"').replace(/\s+/g,' ').trim().toLowerCase();}
const _ABBR=['Mr.','Mrs.','Ms.','Dr.','St.','Jr.','Sr.','vs.','etc.','e.g.','i.e.','U.S.','U.K.','No.','Prof.','Inc.','Ltd.','Co.'];
function splitSentences(text){let t=text;_ABBR.forEach((a,i)=>{t=t.split(a).join('__A'+i+'__');});t=t.replace(/([A-Z])\.(?=\s[A-Z])/g,'$1__D__');
  return t.split(/(?<=[.!?])\s+(?=[A-Z"“(])/).map(p=>{let s=p;_ABBR.forEach((a,i)=>{s=s.split('__A'+i+'__').join(a);});return s.replace(/__D__/g,'.').trim();}).filter(s=>s.length>0);}
function trunc(s,n){s=s||'';return s.length>n?s.slice(0,n)+'…':s;}
function isCorrect(q){const u=state.answers[q.id];if(!isAnswered(q.id))return false;
  if(q.type==='RC_SELECT')return q.answer.length>0&&normSent(u[0])===normSent(q.answer[0]);
  if(q.type==='TC'){if(u.length!==q.answer.length)return false;return u.every((v,i)=>v===q.answer[i]);}
  return arrEq(u.filter(x=>x!==undefined&&x!==''),q.answer);}
function labelText(q,label){
  if(q.type==='TC'){for(const bl of q.blanks){const c=bl.choices.find(c=>c.label===label);if(c)return c.text;}return label;}
  const c=(q.choices||[]).find(c=>c.label===label);return c?c.text:label;}
function myAnswerDisplay(q){const u=state.answers[q.id];if(!isAnswered(q.id))return '<span class="mark-skip">미응답</span>';
  if(q.type==='RC_SELECT')return '“'+trunc(u[0],46)+'”';
  if(q.type==='TC')return u.map(l=>l?labelText(q,l):'—').join(' / ');
  if(q.type==='SE')return u.map(l=>labelText(q,l)).join(', ');
  return u.join(', ');}
function correctDisplay(q){
  if(q.type==='RC_SELECT')return q.answer.length?('“'+trunc(q.answer[0],46)+'”'):'<span class="exp-uncertain">검수 필요</span>';
  if(q.type==='TC'||q.type==='SE')return (q.answerText||q.answer).join(q.type==='TC'?' / ':', ');
  return q.answer.join(', ');}

/* ---- timer ---- */
function startTimer(){if(state.timer)clearInterval(state.timer);state.timeRemaining=curSection().timeLimit*60;updTimer();
  state.timer=setInterval(()=>{state.timeRemaining--;updTimer();if(state.timeRemaining<=0){clearInterval(state.timer);state.timer=null;state.timerExpired[state.sectionIdx]=true;onExpire();}},1000);}
function stopTimer(){if(state.timer){clearInterval(state.timer);state.timer=null;}}
function updTimer(){const el=document.getElementById('timer');if(el){el.textContent=fmt(Math.max(0,state.timeRemaining));el.classList.toggle('warning',state.timeRemaining<=60);}}
function onExpire(){state.endExpired=true;state.screen='sectionEnd';render();}

/* ---- modal ---- */
function showModal(o){document.getElementById('modal-title').textContent=o.title;document.getElementById('modal-message').innerHTML=o.message;
  const cf=document.getElementById('modal-confirm'),cc=document.getElementById('modal-cancel');
  cf.textContent=o.confirmText||'확인';cc.textContent=o.cancelText||'취소';cc.style.display=o.showCancel===false?'none':'inline-block';
  cf.onclick=()=>{if(o.onConfirm)o.onConfirm();};cc.onclick=()=>{if(o.onCancel)o.onCancel();hideModal();};
  document.getElementById('modal').classList.add('show');}
function hideModal(){document.getElementById('modal').classList.remove('show');}

/* ---- render ---- */
function render(){const app=document.getElementById('app');
  if(state.screen==='start')renderStart(app);
  else if(state.screen==='sectionIntro')renderSectionIntro(app);
  else if(state.screen==='question')renderQuestion(app);
  else if(state.screen==='sectionEnd')renderSectionEnd(app);
  else if(state.screen==='results')renderResults(app);
  window.scrollTo(0,0);}

function renderStart(app){const I=examData.intro,sf=examData.scoringFormula;
  app.innerHTML=`<div class="intro">
    <div class="intro-eyebrow">${I.label}</div>
    <div class="intro-title">${I.title}</div>
    <div class="intro-round">${I.roundLabel}</div>
    <div class="main-copy">${I.mainCopy.join('<br>')}</div>
    <div class="author">${I.author}</div>
    <div class="intro-info">
      <div class="row"><span class="k">구성</span><span class="v">2 Sections · 총 ${totalQ()}문항</span></div>
      ${examData.sections.map(s=>`<div class="row"><span class="k">Section ${s.number}</span><span class="v">${s.questions.length}문항 · ${s.timeLimit}분</span></div>`).join('')}
      <div class="row"><span class="k">환산 점수</span><span class="v">round(${sf.multiplier} × 정답수) + ${sf.base}</span></div>
    </div>
    <div class="intro-note"><ul>
      <li>각 섹션은 독립 타이머로 진행되며, 섹션을 완료하면 답안을 수정할 수 없습니다.</li>
      <li>Sentence Equivalence는 정확히 2개를 선택합니다. 채점 후 문항별 해설을 제공합니다.</li>
    </ul></div>
    <button class="btn btn-primary btn-large" onclick="handleStart()">시험 시작하기</button>
  </div>`;}

function renderSectionIntro(app){const s=curSection();
  app.innerHTML=`<div class="card-center">
    <div class="num">Section ${s.number} of ${examData.sections.length}</div>
    <h2>${state.sectionIdx===0?'첫 번째 섹션을 시작합니다':'두 번째 섹션을 시작합니다'}</h2>
    <div class="meta"><strong>${s.questions.length}개 문항</strong> · 제한 시간 <strong>${s.timeLimit}분</strong><br>시작 버튼을 누르면 타이머가 작동합니다.</div>
    <button class="btn btn-primary btn-large" onclick="handleSectionStart()">Section ${s.number} 시작</button>
  </div>`;}

function renderQuestion(app){const q=curQ(),s=curSection(),tot=s.questions.length;
  const isLast=state.questionIdx===tot-1,pct=((state.questionIdx+1)/tot)*100;
  const isRC=['CR','RC_SINGLE','RC_MULTI','RC_SELECT'].includes(q.type);
  let body='';
  if(q.directions)body+=`<div class="directions">${q.directions}</div>`;
  body+=`<div class="question-text">${q.questionText}</div>`;
  body+=renderChoices(q);
  if(q.type==='SE')body+=`<div class="se-warning" id="se-warning"></div>`;
  app.innerHTML=`<div class="topbar"><div class="topbar-left"><span class="label">Section</span><span class="value">${s.number}</span>
      <span style="margin:0 10px;color:var(--line);">·</span><span class="label">Question</span><span class="value">${state.questionIdx+1} / ${tot}</span></div>
      <div class="timer" id="timer">${fmt(state.timeRemaining)}</div></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <main><div class="question-meta"><span class="qtype">${TYPE_LABELS[q.type]}</span><span>${q.poolId}</span></div>
    ${isRC?`<div class="layout-rc">
        <div class="passage" id="passage-box"><span class="passage-label">${q.rangeLabel||'Passage'}</span>${renderPassageHTML(q)}</div>
        <div class="question-body">${body}</div></div>`
       :`<div class="question-body"><span class="qnum-badge">${q.id.replace('-',' ')}</span>${body}</div>`}
    </main>
    <div class="footer-nav"><div class="nav-group"><button class="btn" onclick="handlePrev()" ${state.questionIdx===0?'disabled':''}>← 이전</button></div>
      <div class="nav-group">${isLast?`<button class="btn btn-finish" onclick="goSectionEnd()">섹션 종료 →</button>`:`<button class="btn btn-primary" onclick="handleNext()">다음 →</button>`}</div></div>`;
  updTimer();attachListeners();}

function mk(){return '<span class="mk"></span>';}
function renderPassageHTML(q){
  if(q.type!=='RC_SELECT')return q.passage.split(/\n\n+/).map(p=>`<p>${p}</p>`).join('');
  const u=state.answers[q.id]||[];const selN=u[0]?normSent(u[0]):null;
  return q.passage.split(/\n\n+/).map(para=>{const ss=splitSentences(para.replace(/<[^>]+>/g,''));
    return '<p>'+ss.map(s=>{const sel=selN&&normSent(s)===selN;return `<span class="sentence ${sel?'sel':''}" tabindex="0" data-text="${s.replace(/"/g,'&quot;')}">${s}</span>`;}).join(' ')+'</p>';}).join('');}
function renderChoices(q){const u=state.answers[q.id]||[];
  if(q.type==='RC_SELECT')
    return `<div class="directions">지문에서 정답에 해당하는 문장을 클릭하세요. (한 문장만 선택)</div>`;
  if(q.type==='CR'||q.type==='RC_SINGLE')
    return `<ul class="choices">${q.choices.map(c=>`<li class="choice oval ${u.includes(c.label)?'selected':''}" data-mode="single" data-value="${c.label}">${mk()}<div>${c.text}</div></li>`).join('')}</ul>`;
  if(q.type==='RC_MULTI')
    return `<ul class="choices">${q.choices.map(c=>`<li class="choice square ${u.includes(c.label)?'selected':''}" data-mode="multi" data-value="${c.label}">${mk()}<div>${c.text}</div></li>`).join('')}</ul>`;
  if(q.type==='SE')
    return `<div class="se-hint">정확히 2개를 선택하세요.</div><ul class="choices">${q.choices.map(c=>`<li class="choice square ${u.includes(c.label)?'selected':''}" data-mode="se" data-value="${c.label}">${mk()}<div>${c.text}</div></li>`).join('')}</ul>`;
  if(q.type==='TC'){
    if(q.blanks.length===1){const bl=q.blanks[0];
      return `<table class="tc-table single"><tbody>${bl.choices.map(c=>`<tr><td data-blank="0" data-value="${c.label}" class="${u[0]===c.label?'selected':''}">${c.text}</td></tr>`).join('')}</tbody></table>`;}
    const n=q.blanks.length,rows=q.blanks[0].choices.length;
    let html=`<table class="tc-table"><thead><tr>${q.blanks.map(b=>`<th>Blank ${ROMAN[b.id]||'('+b.id+')'}</th>`).join('')}</tr></thead><tbody>`;
    for(let r=0;r<rows;r++){html+='<tr>'+q.blanks.map((b,ci)=>{const c=b.choices[r];return `<td data-blank="${ci}" data-value="${c.label}" class="${u[ci]===c.label?'selected':''}">${c.text}</td>`;}).join('')+'</tr>';}
    html+='</tbody></table>';return html;}
  return '';}

function attachListeners(){
  document.querySelectorAll('.choice').forEach(li=>li.addEventListener('click',()=>onChoice(li)));
  document.querySelectorAll('.tc-table td').forEach(td=>td.addEventListener('click',()=>onTC(td)));
  const q=curQ();
  if(q&&q.type==='RC_SELECT'){document.querySelectorAll('.passage .sentence').forEach(sp=>{
    const pick=()=>{const txt=sp.dataset.text;const cur=state.answers[q.id]||[];const is=cur[0]&&normSent(cur[0])===normSent(txt);
      state.answers[q.id]=is?[]:[txt];document.querySelectorAll('.passage .sentence').forEach(x=>x.classList.remove('sel'));if(!is)sp.classList.add('sel');};
    sp.addEventListener('click',pick);sp.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();pick();}});});}}
function onChoice(li){const q=curQ(),mode=li.dataset.mode,val=li.dataset.value;
  if(mode==='single'){state.answers[q.id]=[val];document.querySelectorAll('.choice[data-mode="single"]').forEach(x=>x.classList.remove('selected'));li.classList.add('selected');}
  else if(mode==='multi'){let cur=state.answers[q.id]||[];if(cur.includes(val)){cur=cur.filter(v=>v!==val);li.classList.remove('selected');}else{cur=[...cur,val];li.classList.add('selected');}state.answers[q.id]=cur;}
  else if(mode==='se'){let cur=state.answers[q.id]||[];const w=document.getElementById('se-warning');
    if(cur.includes(val)){cur=cur.filter(v=>v!==val);li.classList.remove('selected');}
    else{if(cur.length>=2){w.textContent='정확히 2개까지만 선택할 수 있습니다.';w.classList.add('show');setTimeout(()=>w.classList.remove('show'),1800);return;}cur=[...cur,val];li.classList.add('selected');}
    state.answers[q.id]=cur;}}
function onTC(td){const q=curQ(),bi=+td.dataset.blank,val=td.dataset.value;
  let cur=state.answers[q.id]||new Array(q.blanks.length).fill(undefined);cur=[...cur];cur[bi]=val;state.answers[q.id]=cur;
  document.querySelectorAll(`.tc-table td[data-blank="${bi}"]`).forEach(x=>x.classList.remove('selected'));td.classList.add('selected');}

/* ---- section end ---- */
function goSectionEnd(){state.endExpired=false;state.screen='sectionEnd';render();}
function renderSectionEnd(app){const s=curSection();const used=s.timeLimit*60-Math.max(0,state.timeRemaining);
  let ans=0;s.questions.forEach(q=>{if(isAnswered(q.id))ans++;});
  const last=state.sectionIdx===examData.sections.length-1;
  app.innerHTML=`<div class="card-center">
    <div class="num">Section ${s.number} 풀이 완료</div>
    <h2>Section ${s.number}을(를) 마칩니다</h2>
    <div class="meta">소요 시간 <strong>${fmt(used)} / ${fmt(s.timeLimit*60)}</strong><br>응답한 문항 <strong>${ans} / ${s.questions.length}</strong></div>
    <div class="warn-box">⚠️ "${last?'완료하고 채점':'완료하고 다음 섹션'}" 버튼을 누르면 Section ${s.number}의 답안은 <br>더 이상 수정할 수 없습니다.${state.endExpired?'<br><br>제한 시간이 종료되었습니다.':'<br><br>남은 시간이 있으니 풀이로 돌아가 검토할 수 있습니다.'}</div>
    <div class="end-actions">
      ${state.endExpired?'':`<button class="btn" onclick="backToQuestions()">← 풀이 화면으로</button>`}
      <button class="btn btn-finish" onclick="finishSection()">${last?'완료하고 채점 →':'완료하고 다음 섹션 →'}</button>
    </div></div>`;
  updTimer();}
function backToQuestions(){state.screen='question';render();}
function finishSection(){stopTimer();state.sectionLocked[state.sectionIdx]=true;
  if(state.sectionIdx<examData.sections.length-1){state.sectionIdx++;state.questionIdx=0;state.endExpired=false;state.screen='sectionIntro';}
  else{state.screen='results';}render();}

/* ---- results + explanations ---- */
function renderResults(app){let totalCorrect=0;
  const stats=examData.sections.map(s=>{let c=0;s.questions.forEach(q=>{if(isCorrect(q))c++;});totalCorrect+=c;return{num:s.number,correct:c,total:s.questions.length};});
  const tq=totalQ();const score=Math.round(examData.scoringFormula.multiplier*totalCorrect)+examData.scoringFormula.base;
  let rows='';
  examData.sections.forEach(s=>{
    rows+=`<tr class="section-divider"><td colspan="7">Section ${s.number}</td></tr>`;
    s.questions.forEach(q=>{const ok=isCorrect(q);const mark=ok?'<span class="mark-correct">✓</span>':'<span class="mark-wrong">✗</span>';
      rows+=`<tr><td>${q.id}</td><td><div class="m-pool">${q.poolId}</div>${tierBadge(q.frequency)}</td><td style="color:var(--ink-mute);font-size:12px;">${shortType(q.type)}</td>
        <td>${myAnswerDisplay(q)}</td><td><strong>${correctDisplay(q)}</strong></td>
        <td style="text-align:center;font-size:17px;">${mark}</td>
        <td><button class="exp-toggle" onclick="toggleExp('${q.id}')">${state.expanded[q.id]?'해설 닫기 ▲':'▶ 해설'}</button></td></tr>`;
      if(state.expanded[q.id])rows+=`<tr class="exp-row"><td colspan="7"><div class="exp-wrap">${renderExplanation(q)}</div></td></tr>`;});
  });
  app.innerHTML=`<main class="results">
    <div class="results-header"><div class="eyebrow">Test Complete</div><h2>채점 결과</h2></div>
    <div class="score-card">
      <div class="score-cell"><div class="label">총 정답</div><div class="value">${totalCorrect}<span class="total"> / ${tq}</span></div><div class="sub">${stats.map(s=>'S'+s.num+': '+s.correct+'/'+s.total).join(' · ')}</div></div>
      <div class="score-cell"><div class="label">정답률</div><div class="value">${Math.round(totalCorrect/tq*100)}<span class="total">%</span></div><div class="sub">${totalCorrect} of ${tq}</div></div>
      <div class="score-cell"><div class="label">환산 점수</div><div class="value">${score}</div><div class="sub">round(${examData.scoringFormula.multiplier} × ${totalCorrect}) + ${examData.scoringFormula.base}</div></div>
    </div>
    <div class="meta-notice">※ 각 해설 첫 줄의 <b>총 출제 횟수</b>와 <b>출제 연월</b>은 본 강사 자체 통계 기준입니다.<br>※ 같은 달에 여러 번 출제된 문제는 출제 연월보다 출제 횟수가 많을 수 있습니다.</div>
    <div class="exp-controls"><button class="btn" onclick="expandAll(true)">모두 펼치기</button><button class="btn" onclick="expandAll(false)">모두 접기</button></div>
    <div class="tier-legend"><span>빈출 등급(출제 횟수):</span><span class="tier tier-top">★★★ 최상위</span>8회↑<span class="tier tier-high">★★ 상위</span>4–7회<span class="tier tier-mid">★ 중위</span>2–3회<span class="tier tier-low">☆ 저빈도</span>1회</div>
    <div class="results-table"><table><thead><tr><th style="width:70px;">번호</th><th style="width:172px;">모모집 · 빈출 등급</th><th>유형</th><th>내 답</th><th>정답</th><th style="width:52px;text-align:center;">결과</th><th style="width:88px;">해설</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="results-actions" style="text-align:center;display:flex;gap:12px;justify-content:center;">
      <button class="btn" onclick="window.print()">결과 인쇄</button><button class="btn btn-primary" onclick="location.reload()">다시 풀기</button></div>
  </main>`;}
function shortType(t){return t==='RC_SINGLE'?'RC':t==='RC_MULTI'?'RC·다':t;}
function tierBadge(f){const M={'최상위':['tier-top','★★★'],'상위':['tier-high','★★'],'중위':['tier-mid','★'],'저빈도':['tier-low','☆']};const t=M[f.bucket]||['tier-low','☆'];return `<span class="tier ${t[0]}">${t[1]} ${f.bucket} · ${f.count}회</span>`;}
function toggleExp(id){state.expanded[id]=!state.expanded[id];render();}
function expandAll(v){examData.sections.forEach(s=>s.questions.forEach(q=>state.expanded[q.id]=v));render();}

function renderReview(q){const u=state.answers[q.id]||[];const isRC=['CR','RC_SINGLE','RC_MULTI'].includes(q.type);
  let h='';
  if(q.type==='RC_SELECT'){const selN=u[0]?normSent(u[0]):null,corN=q.answer.length?normSent(q.answer[0]):null;
    h+='<div class="rev-passage">'+q.passage.split(/\n\n+/).map(para=>{const ss=splitSentences(para.replace(/<[^>]+>/g,''));
      return '<p>'+ss.map(s=>{const n=normSent(s);let c=(corN&&n===corN)?'rev-sent-correct':((selN&&n===selN)?'rev-sent-wrong':'');return c?`<span class="${c}">${s}</span>`:s;}).join(' ')+'</p>';}).join('')+'</div>';
    h+=`<div class="rev-stem">${q.questionText}</div><div style="font-family:var(--ui);font-size:12.5px;color:var(--ink-soft);">초록 = 정답 문장 · 빨강 = 내가 고른 문장${corN?'':' · ⚠️ 정답 문장 매핑 검수 필요'}</div>`;
    return h;}
  if(isRC){h+=`<div class="rev-passage">${q.passage.split(/\n\n+/).map(p=>'<p>'+p+'</p>').join('')}</div>`;
    if(q.directions)h+=`<div class="directions">${q.directions}</div>`;
    h+=`<div class="rev-stem">${q.questionText}</div>`;
    h+=q.choices.map(c=>{const correct=q.answer.includes(c.label),mine=u.includes(c.label);
      let cls=correct?'is-correct':(mine?'is-wrong':'');let tag='';
      if(correct)tag='<span class="rev-tag t-correct">정답</span>';else if(mine)tag='<span class="rev-tag t-mine">내 선택</span>';
      const m=q.type==='RC_SINGLE'||q.type==='CR'?'oval':'square';
      return `<div class="rev-choice ${cls}"><span class="rc-let">${c.label}</span><div>${c.text}</div>${tag}</div>`;}).join('');
  }else if(q.type==='SE'){h+=`<div class="rev-stem">${q.questionText}</div>`;
    h+=q.choices.map(c=>{const correct=q.answer.includes(c.label),mine=u.includes(c.label);
      let cls=correct?'is-correct':(mine?'is-wrong':'');let tag=correct?'<span class="rev-tag t-correct">정답</span>':(mine?'<span class="rev-tag t-mine">내 선택</span>':'');
      return `<div class="rev-choice ${cls}"><div>${c.text}</div>${tag}</div>`;}).join('');
  }else{ // TC
    h+=`<div class="rev-stem">${q.questionText}</div>`;
    h+=q.blanks.map((bl,i)=>{const correct=q.answer[i],mine=u[i];const ct=labelText(q,correct);const mt=mine?labelText(q,mine):'미응답';const ok=mine===correct;
      return `<div class="rev-blank"><span class="bl">Blank ${bl.id==='i'?'(i)':bl.id==='ii'?'(ii)':'(iii)'}</span><br>정답: <span class="ans-ok">${ct}</span> · 내 답: <span class="${ok?'ans-ok':'ans-no'}">${mt}${mine&&!ok?' ✗':''}</span></div>`;}).join('');
  }
  return h;}

function renderExplanation(q){const e=examData.explanations[q.id]||{};const f=q.frequency;const ok=isCorrect(q);
  const months=f.months.join(', ');
  const myDisp=isAnswered(q.id)?myAnswerDisplay(q):'<span class="mark-skip">미응답</span>';
  let wrong='';
  if(e.wrong){wrong=Object.keys(e.wrong).map(L=>{const t=labelText(q,L);return `<li><b>(${L}) ${t?'<i>'+t+'</i>':''}</b> — ${e.wrong[L]}</li>`;}).join('');}
  return `<div class="exp-grid">
    <div class="exp-left"><div class="exp-col-title">▣ 풀이 다시보기</div>${renderReview(q)}</div>
    <div class="exp-right"><div class="exp-col-title">▤ 해설</div>
      <div class="exp-meta">
        <span class="m-id">모모집 ${q.poolId}</span><span class="m-cnt">출제 ${f.count}회</span> ${tierBadge(f)}
        <div class="m-row">출제 연월: ${months}</div>
        <div class="m-row m-ans">정답: <span class="ans-c">${correctDisplay(q)}</span> · 내 선택: <span class="ans-m ${ok?'':'mark-wrong'}">${myDisp}${ok?' ✓':' ✗'}</span></div>
      </div>
      <div class="exp-sec"><h4>【해석】</h4><p>${e.interp||''}</p></div>
      <div class="exp-sec"><h4>【유형·해법】</h4><p>${e.strat||''}</p></div>
      <div class="exp-sec"><h4>【정답 근거】</h4><p>${e.correct||''}</p></div>
      <div class="exp-sec"><h4>【오답 이유】</h4><ul>${wrong}</ul></div>
      ${e.uncertain?'<div class="exp-uncertain">⚠️ 근거 불확실 — 검수 필요</div>':''}
    </div></div>`;}

/* ---- handlers ---- */
function handleStart(){state.screen='sectionIntro';render();}
function handleSectionStart(){state.screen='question';state.questionIdx=0;startTimer();render();}
function handlePrev(){if(state.questionIdx>0){state.questionIdx--;render();}}
function handleNext(){if(state.questionIdx<curSection().questions.length-1){state.questionIdx++;render();}}
document.addEventListener('DOMContentLoaded',render);render();

</script>
</body>
</html>
