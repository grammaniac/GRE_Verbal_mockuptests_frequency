
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRE Verbal 빈출 문제 모의고사 — 1회</title>
<style>
:root {
  --bg: #F4EFE6; --paper: #FFFFFF; --paper-2: #FBF8F2;
  --ink: #14181F; --ink-soft: #2F3640; --ink-mute: #6A7280;
  --rule: rgba(20,24,31,.18); --rule-strong: #B8B0A0;
  --accent: #B9381E; --accent-2: #1F3A5F; --accent-3: #3F6342;
  --accent-soft: #E9D9C7; --highlight: #F6D976;
  --green: #2F855A; --red: #C53030;
  --select-bg: #D8E4F2; --select-border: #1F3A5F;
  --marker: #2F3640;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: "Pretendard Variable", "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.55; }
.container { max-width: 1320px; margin: 0 auto; padding: 24px 22px 80px; }
button { font-family: inherit; cursor: pointer; }

.highlighted { background: var(--highlight); padding: 1px 2px; border-radius: 2px; }
.passage-body strong, .replay-passage strong, .stimulus-text strong { font-weight: 700; }
.passage-body em, .replay-passage em { font-style: italic; }

/* ===== Intro page — 3-tier title hierarchy ===== */
.intro-page { max-width: 760px; margin: 28px auto; padding: 14px; }
.intro-eyebrow {
  text-align: center;
  font-family: "Inter", system-ui, sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 16px;
}
.intro-title {
  text-align: center;
  font-family: "Fraunces", "Noto Serif KR", "Apple SD Gothic Neo", serif;
  font-size: 2.0em;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0 0 4px;
  line-height: 1.25;
}
.intro-subtitle {
  text-align: center;
  font-family: "Fraunces", "Noto Serif KR", serif;
  font-style: italic;
  font-size: 1.15em;
  font-weight: 400;
  color: var(--ink-mute);
  margin-bottom: 22px;
}
.main-copy {
  background: var(--accent-soft);
  border-left: 4px solid var(--accent);
  border-radius: 8px;
  padding: 16px 20px;
  margin: 18px auto;
  max-width: 520px;
  font-size: 1.08em;
  font-weight: 600;
  line-height: 1.6;
  text-align: center;
  color: var(--ink);
}
.author {
  text-align: center;
  font-size: 0.98em;
  color: var(--ink-soft);
  letter-spacing: .03em;
  margin-bottom: 20px;
}
.info-card {
  background: var(--paper);
  border-radius: 12px;
  box-shadow: 0 3px 14px rgba(0,0,0,.05);
  padding: 8px 26px;
  margin: 0 auto 20px;
  max-width: 600px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 9px 0;
  border-bottom: 1px solid var(--rule);
}
.info-row:last-child { border-bottom: none; }
.info-row .label { color: var(--ink-mute); font-size: .9em; }
.info-row .value { color: var(--ink); font-weight: 600; font-size: .95em; }
.intro-bullets {
  max-width: 600px;
  margin: 0 auto 20px;
  padding: 0 8px;
  font-size: .9em;
  color: var(--ink-soft);
  line-height: 1.65;
}
.intro-bullets li { margin-bottom: 2px; }
.intro-cta {
  text-align: center;
  margin-top: 18px;
}
.start-btn {
  font-size: 1.02em;
  font-weight: 600;
  padding: 12px 38px;
  border: none;
  border-radius: 8px;
  background: var(--accent-2);
  color: white;
  transition: background .2s;
}
.start-btn:hover { background: #14283f; }

/* ===== Section start page ===== */
.section-start { max-width: 800px; margin: 80px auto; padding: 16px; text-align: center; }
.section-start-eyebrow {
  font-family: "Inter", system-ui, sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 28px;
}
.section-start-card {
  background: var(--paper);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,.05);
  padding: 80px 40px 60px;
}
.section-start-title {
  font-family: "Fraunces", "Noto Serif KR", "Apple SD Gothic Neo", serif;
  font-size: 2.2em;
  font-weight: 700;
  color: var(--ink);
  margin: 0 0 36px;
  line-height: 1.3;
}
.section-start-info {
  font-size: 1.1em;
  font-weight: 600;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.section-start-info strong { color: var(--ink); }
.section-start-hint {
  font-size: .95em;
  color: var(--ink-mute);
  margin-bottom: 40px;
}
.section-start-btn {
  font-size: 1.06em;
  font-weight: 600;
  padding: 14px 42px;
  border: none;
  border-radius: 8px;
  background: var(--accent-2);
  color: white;
  transition: background .2s;
}
.section-start-btn:hover { background: #14283f; }

/* ===== Section header (during section) ===== */
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: var(--paper); border-radius: 10px; margin-bottom: 16px; box-shadow: 0 2px 6px rgba(0,0,0,.04); position: sticky; top: 8px; z-index: 5; }
.section-title { font-weight: 700; font-size: 1.05em; }
.timer { font-family: "JetBrains Mono", "SF Mono", monospace; font-size: 1.2em; font-weight: 700; color: var(--accent-2); padding: 4px 12px; background: var(--accent-soft); border-radius: 6px; min-width: 88px; text-align: center; }
.timer.warn { background: #FCD9C9; color: var(--accent); }

/* ===== Question shell ===== */
.qcard { background: var(--paper); padding: 22px 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.qhead { font-size: .92em; color: var(--ink-mute); margin-bottom: 12px; letter-spacing: .05em; }
.qhead .qnum { font-weight: 700; color: var(--ink-soft); margin-right: 8px; }
.stem { font-size: 1.06em; margin-bottom: 18px; line-height: 1.7; }
.directive { font-style: italic; color: var(--ink-soft); margin: 10px 0 8px; font-size: .96em; }

/* ===== TC table (only TC) ===== */
.tc-wrap { margin-top: 8px; }
.tc-table { border-collapse: collapse; width: 100%; max-width: 760px; margin-top: 6px; }
.tc-table th, .tc-table td { border: 1px solid var(--rule-strong); padding: 11px 14px; text-align: center; font-size: 1em; }
.tc-table th { background: var(--accent-soft); color: var(--accent-2); font-weight: 700; font-size: .92em; letter-spacing: .05em; }
.tc-table td { cursor: pointer; transition: background .15s, border-color .15s; user-select: none; }
.tc-table td:hover { background: #FBF5EA; }
.tc-table td.selected { background: var(--select-bg); border-color: var(--select-border); font-weight: 600; color: var(--accent-2); box-shadow: inset 0 0 0 1.5px var(--select-border); }
.tc-table.cols-1 td { text-align: left; padding-left: 18px; }

/* ===== SE/RC list-based ===== */
.choice-list { list-style: none; padding: 0; margin: 6px 0 0; }
.choice-list li { display: flex; align-items: flex-start; gap: 14px; padding: 10px 14px; margin-bottom: 6px; border-radius: 6px; cursor: pointer; transition: background .15s; }
.choice-list li:hover { background: var(--paper-2); }
.choice-list li.selected { background: var(--select-bg); }

.sq-marker { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--marker); border-radius: 2px; flex-shrink: 0; margin-top: 2px; transition: background .15s, border-color .15s; position: relative; }
.choice-list li.selected .sq-marker { background: var(--accent-2); border-color: var(--accent-2); }
.choice-list li.selected .sq-marker::after { content: ""; position: absolute; left: 4px; top: 0px; width: 6px; height: 12px; border-right: 2.5px solid white; border-bottom: 2.5px solid white; transform: rotate(45deg); }

.oval-marker { display: inline-block; width: 26px; height: 15px; border: 2px solid var(--marker); border-radius: 50%; flex-shrink: 0; margin-top: 4px; transition: background .15s, border-color .15s; }
.choice-list li.selected .oval-marker { background: var(--accent-2); border-color: var(--accent-2); }

.se-warning { font-size: .9em; color: var(--ink-mute); margin-bottom: 8px; }
.se-warning.err { color: var(--accent); font-weight: 600; }

/* ===== RC/CR 2-column ===== */
.rc-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 24px; align-items: start; }
@media (max-width: 768px) {
  .rc-grid { grid-template-columns: 1fr; }
  .passage-box {
    position: static !important;
    max-height: none !important;
    overflow-y: visible !important;
    top: auto !important;
  }
  .container { padding: 14px 14px 60px; }
  .intro-page { margin: 16px auto; }
  .intro-title { font-size: 1.65em; }
  .intro-subtitle { font-size: 1.05em; margin-bottom: 18px; }
  .main-copy { font-size: 1em; padding: 14px 18px; }
  .info-card { padding: 4px 18px; }
  .info-row { padding: 8px 0; font-size: .9em; }
  .intro-bullets { font-size: .88em; line-height: 1.6; }
}
.passage-box { background: var(--paper); padding: 20px 22px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
@media (min-width: 769px) {
  .passage-box { position: sticky; top: 78px; max-height: calc(100vh - 100px); overflow-y: auto; }
}
.passage-meta { display: inline-block; background: var(--accent-2); color: white; font-size: .82em; font-weight: 700; padding: 4px 12px; border-radius: 12px; letter-spacing: .05em; margin-bottom: 14px; }
.passage-body { font-size: .98em; line-height: 1.75; color: var(--ink); white-space: pre-wrap; }
.question-col { background: var(--paper); padding: 20px 22px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.qpos { font-size: .85em; color: var(--ink-mute); margin-bottom: 4px; }

/* ===== Nav ===== */
.nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; padding: 0 4px; }
.nav-bar button { padding: 10px 22px; background: var(--accent-2); color: white; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; }
.nav-bar button:disabled { background: var(--ink-mute); opacity: .5; cursor: not-allowed; }
.nav-bar button.next-section { background: var(--accent-3); }
.progress { font-size: .92em; color: var(--ink-mute); }

/* ===== Section complete ===== */
.section-complete { background: var(--paper); padding: 50px 40px; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,.06); text-align: center; max-width: 700px; margin: 60px auto; }
.section-complete h2 { font-size: 1.8em; margin: 0 0 28px; color: var(--accent-2); }
.complete-stats { display: flex; gap: 36px; justify-content: center; margin: 22px 0 36px; flex-wrap: wrap; }
.complete-stats .label { font-size: .9em; color: var(--ink-mute); }
.complete-stats .value { font-size: 1.5em; font-weight: 700; color: var(--ink-soft); margin-top: 4px; }
.warning-box { background: #FFF4E5; border-left: 4px solid #E58200; padding: 18px 22px; border-radius: 0 8px 8px 0; margin: 22px auto 28px; text-align: left; max-width: 540px; font-size: .98em; line-height: 1.7; color: #6A4500; }
.warning-box p { margin: 0 0 6px; }
.warning-box p:last-child { margin: 12px 0 0; }
.complete-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.complete-actions button { padding: 13px 28px; font-size: 1.02em; border-radius: 8px; border: none; font-weight: 600; }
.complete-actions .back-btn { background: var(--paper); color: var(--accent-2); border: 1px solid var(--accent-2); }
.complete-actions .confirm-btn { background: var(--accent-3); color: white; }
.complete-actions .confirm-btn.final { background: var(--accent); }

/* ===== Results ===== */
.results { background: var(--paper); padding: 32px 28px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.05); }
.results h2 { margin-top: 0; }
.score-summary { display: flex; gap: 32px; padding: 20px 0; border-bottom: 1px solid var(--rule); margin-bottom: 18px; flex-wrap: wrap; }
.score-item { flex: 1; min-width: 140px; }
.score-item .label { font-size: .88em; color: var(--ink-mute); margin-bottom: 4px; }
.score-item .value { font-size: 1.8em; font-weight: 700; color: var(--accent-2); }
.meta-notice { background: var(--accent-soft); padding: 12px 16px; border-radius: 8px; font-size: .9em; color: var(--ink-soft); margin: 14px 0 24px; line-height: 1.65; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.actions button { padding: 8px 18px; background: var(--paper); color: var(--ink); border: 1px solid var(--rule); border-radius: 6px; font-size: .9em; }
.results-table { width: 100%; border-collapse: collapse; margin-top: 14px; }
.results-table th, .results-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--rule); font-size: .95em; }
.results-table th { background: var(--paper-2); font-weight: 600; }
.results-table .ok { color: var(--green); font-weight: 700; }
.results-table .ng { color: var(--red); font-weight: 700; }
.exp-toggle { background: var(--accent-2); color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: .85em; cursor: pointer; }
.exp-toggle.open { background: var(--accent); }

/* ===== Explanation 2-col ===== */
.exp-row td { padding: 0 !important; background: var(--bg); }
.exp-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; padding: 14px 8px; }
@media (max-width: 820px) { .exp-grid { grid-template-columns: 1fr; } }
.exp-pane { background: var(--paper); border-radius: 10px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.exp-pane-header { font-size: .85em; font-weight: 700; color: var(--accent-2); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--accent-2); letter-spacing: .05em; }
.replay-passage { background: var(--paper-2); padding: 14px 16px; border-radius: 8px; margin-bottom: 12px; line-height: 1.65; font-size: .95em; white-space: pre-wrap; }
.replay-stem { font-size: 1em; margin-bottom: 10px; font-weight: 500; }
.replay-directive { font-style: italic; color: var(--ink-soft); font-size: .9em; margin-bottom: 6px; }
.replay-table { border-collapse: collapse; width: 100%; max-width: 100%; margin-top: 4px; font-size: .94em; }
.replay-table th, .replay-table td { border: 1px solid var(--rule-strong); padding: 8px 10px; text-align: center; }
.replay-table th { background: var(--accent-soft); color: var(--accent-2); font-weight: 700; font-size: .88em; }
.replay-table td.is-correct { background: #DFF5E1; color: var(--green); font-weight: 700; }
.replay-table td.is-wrong-mine { background: #FBE2E2; color: var(--red); font-weight: 600; }
.replay-list { list-style: none; padding: 0; margin: 4px 0 0; }
.replay-list li { display: flex; gap: 10px; padding: 6px 8px; align-items: flex-start; font-size: .94em; border-radius: 4px; margin-bottom: 3px; }
.replay-list li.is-correct { background: #DFF5E1; color: var(--green); font-weight: 600; }
.replay-list li.is-wrong-mine { background: #FBE2E2; color: var(--red); }
.replay-list .marker-sq, .replay-list .marker-oval { flex-shrink: 0; margin-top: 4px; }
.replay-list .marker-sq { width: 14px; height: 14px; border: 1.5px solid var(--marker); border-radius: 2px; }
.replay-list .marker-oval { width: 22px; height: 13px; border: 1.5px solid var(--marker); border-radius: 50%; }
.replay-list li.is-correct .marker-sq, .replay-list li.is-correct .marker-oval { background: var(--green); border-color: var(--green); }
.replay-list li.is-wrong-mine .marker-sq, .replay-list li.is-wrong-mine .marker-oval { background: var(--red); border-color: var(--red); }

.exp-meta-box { background: var(--accent-soft); border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: .92em; line-height: 1.7; }
.exp-meta-box .meta-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.exp-meta-box .meta-label { background: var(--accent-2); color: white; font-size: .78em; font-weight: 700; padding: 2px 9px; border-radius: 11px; letter-spacing: .04em; min-width: 86px; text-align: center; }
.exp-meta-box .meta-value { color: var(--ink); font-weight: 500; }
.exp-meta-box .meta-value.big { font-size: 1.1em; font-weight: 700; color: var(--accent); }
.exp-meta-box .meta-value.correct { color: var(--green); font-weight: 700; }
.exp-meta-box .meta-value.wrong { color: var(--red); font-weight: 700; }
.exp-meta-box .meta-value.none { color: var(--ink-mute); }
.exp-body section { margin-top: 12px; }
.exp-body h4 { margin: 0 0 6px; font-size: 1em; color: var(--accent-2); display: inline-block; padding: 2px 10px; background: var(--paper-2); border-radius: 4px; }
.exp-body p { margin: 4px 0; }
.exp-body ul { margin: 0; padding-left: 22px; }

@media print {
  .timer, .start-btn, .nav-bar, .exp-toggle, .actions, .complete-actions, .section-start-btn { display: none !important; }
  .section-header { position: static; }
  .exp-grid { break-inside: avoid; }
}
</style>
</head>

es": [{"label": "purpose", "text": "purpose"}, {"label": "talent", "text": "talent"}, {"label": "abilities", "text": "abilities"}, {"label": "trepidation", "text": "trepidation"}, {"label": "misgivings", "text": "misgivings"}, {"label": "ambition", "text": "ambition"}], "answer": ["trepidation", "misgivings"]}, {"id": "S2-Q13", "type": "SE", "poolId": "TCSE 3038", "bucket": "저빈도", "frequency": {"count": 1, "months": ["2025-02"]}, "questionText": "By the time they enter sixth grade, many children sleep so little during the school week that daytime drowsiness may __________ their ability to pay attention and learn.", "choices": [{"label": "compromise", "text": "compromise"}, {"label": "define", "text": "define"}, {"label": "highlight", "text": "highlight"}, {"label": "emphasize", "text": "emphasize"}, {"label": "imperil", "text": "imperil"}, {"label": "destroy", "text": "destroy"}], "answer": ["compromise", "imperil"]}, {"id": "S2-Q14", "type": "SE", "poolId": "TCSE 2523", "bucket": "상위", "frequency": {"count": 6, "months": ["2025-01", "2025-04", "2025-06", "2025-11", "2026-01", "2026-03"]}, "questionText": "The reader does well to approach claims in this autobiography with a certain amount of friendly skepticism, but the overall impression it conveys is that veracity wins out over __________.", "choices": [{"label": "blame", "text": "blame"}, {"label": "invention", "text": "invention"}, {"label": "contrivance", "text": "contrivance"}, {"label": "censure", "text": "censure"}, {"label": "venom", "text": "venom"}, {"label": "concern", "text": "concern"}], "answer": ["invention", "contrivance"]}, {"id": "S2-Q15", "type": "SE", "poolId": "TCSE 1934", "bucket": "최상위", "frequency": {"count": 10, "months": ["2021-02", "2021-06", "2022-04", "2022-10", "2023-11", "2024-01", "2024-08", "2024-12", "2025-08"]}, "questionText": "That the announcement of the new treatment was greeted with ___________ is hardly surprising given the claims made for it, but attitudes were markedly tempered once the paucity of supporting data became apparent.", "choices": [{"label": "skepticism", "text": "skepticism"}, {"label": "disbelief", "text": "disbelief"}, {"label": "euphoria", "text": "euphoria"}, {"label": "optimism", "text": "optimism"}, {"label": "impatience", "text": "impatience"}, {"label": "jubilation", "text": "jubilation"}], "answer": ["euphoria", "jubilation"]}]}], "passageGroups": {"G_738": {"poolId": "RCCR 738", "passage": "Many self-taught artists start creating later in life; Thornton Dial's singularity lay in the nature of his production. Instead of recording memories or Bible stories, he tackled ambitious subjects that were often political: women's roles; the Vietnam War; and the travails and progress of African Americans, for which he often chose a tiger figure to symbolize himself or African Americans generally challenging the world. Moreover, where most self-taught artists gravitate to some form of relatively tidy representation, however idiosyncratic, Dial's style from the beginning was expressionist and even abstract. Although he had never visited an art museum, Dial's gestural boldness, large scale, heavily encrusted surfaces, and disdain for prettiness gave his work a look that was more downtown than down-home and very much aligned with the 1980s contemporary-art scene.", "passage_html": "Many self-taught artists start creating later in life; Thornton Dial's singularity lay in the nature of his production. Instead of <span class=\"highlighted\">recording</span> memories or Bible stories, he tackled ambitious subjects that were often political: women's roles; the Vietnam War; and the travails and progress of African Americans, for which he often chose a tiger figure to symbolize himself or African Americans generally challenging the world. Moreover, where most self-taught artists gravitate to some form of relatively tidy representation, however idiosyncratic, Dial's style from the beginning was expressionist and even abstract. Although he had never visited an art museum, Dial's gestural boldness, large scale, heavily encrusted surfaces, and disdain for prettiness gave his work a look that was more downtown than down-home and very much aligned with the 1980s contemporary-art scene.", "subqCount": 2, "appliedTo": ["S1-Q2", "S1-Q3"], "range": "S1 Q2-Q3"}, "G_772": {"poolId": "RCCR 772", "passage": "In a street-sanitation study in Metroville this year, 75 percent of residential city blocks were rated \"clean\" or \"very clean,\" whereas in a similar study a decade ago only 40 percent were rated \"clean\" or better. Therefore a resident of Metroville today is more likely to live on a clean or very clean city block than a resident a decade ago.", "passage_html": "In a street-sanitation study in Metroville this year, 75 percent of residential city blocks were rated \"clean\" or \"very clean,\" whereas in a similar study a decade ago only 40 percent were rated \"clean\" or better. Therefore a resident of Metroville today is more likely to live on a clean or very clean city block than a resident a decade ago.", "subqCount": 1, "appliedTo": ["S2-Q1"], "range": "S2 Q1"}, "G_735": {"poolId": "RCCR 735", "passage": "Recently, controversial findings were released that suggest that the amount of carbon dioxide absorbed by United States forests might be greater than the amount emitted by the nation's fossil-fuel combustion. This conclusion has two astonishing implications. First, the United States may not be directly contributing to rising atmospheric levels of carbon dioxide. Second, the atmosphere seems to be benefiting from young forests, which are particularly efficient at absorbing carbon dioxide. But these young forests exist only because old-growth forests were clear-cut in earlier centuries. The possibility that the United States absorbs more carbon dioxide than it produces thus does not reflect efforts to protect the environment; rather, it reflects a history of deforestation and development.", "passage_html": "Recently, controversial findings were released that suggest that the amount of carbon dioxide absorbed by United States forests might be greater than the amount emitted by the nation's fossil-fuel combustion. This conclusion has two astonishing implications. First, the United States may not be directly contributing to rising atmospheric levels of carbon dioxide. Second, the atmosphere seems to be benefiting from young forests, which are particularly efficient at absorbing carbon dioxide. But these young forests exist only because old-growth forests were clear-cut in earlier centuries. The possibility that the United States absorbs more carbon dioxide than it produces thus does not reflect efforts to protect the environment; rather, it reflects a history of deforestation and development.", "subqCount": 2, "appliedTo": ["S2-Q2", "S2-Q3"], "range": "S2 Q2-Q3"}, "G_941": {"poolId": "RCCR 941", "passage": "Advertising campaigns by Neltland’s credit card companies have become highly aggressive, presenting strong incentives for people to open credit card accounts and to charge purchases on them. However, according to credit card company reports, the average debt carried on any given company’s credit card has increased by less than 5 percent over the last few years, a modest increase more than offset by rising wages. Therefore, concerns that aggressive advertising is prompting Neltlanders to take on excessive debt are unfounded.", "passage_html": "Advertising campaigns by Neltland’s credit card companies have become highly aggressive, presenting strong incentives for people to open credit card accounts and to charge purchases on them. However, according to credit card company reports, the average debt carried on any given company’s credit card has increased by less than 5 percent over the last few years, a modest increase more than offset by rising wages. Therefore, concerns that aggressive advertising is prompting Neltlanders to take on excessive debt are unfounded.", "subqCount": 1, "appliedTo": ["S1-Q1"], "range": "S1 Q1"}, "G_187": {"poolId": "RCCR 187", "passage": "Like Germany, but unlike other European nations, Norway industrialized rather late in the nineteenth century. Compared to Germany, however, Norway has a comparatively recent history of industrially based social classes and a much longer history of rather egalitarian class relations. The origin of Norwegian egalitarian predates industrialism and the rise of the labor movement. The preindustrial economy was based largely on a small independent peasantry who combined agriculture with fishing (in the north) or with forestry (in the south). Because Norway was under foreign rule for five centuries until 1905, and because the topography is unfavorable for large estates, a strong aristocracy and landowner class did not emerge in most of Norway. There were some exceptions to this pattern, especially in the southern regions where a landowner class did exist. Norway’s early social and economic history engendered egalitarianism, although, as has been pointed out by several observers, it was an equality of poverty.", "passage_html": "Like Germany, but unlike other European nations, Norway industrialized rather late in the nineteenth century. Compared to Germany, however, Norway has a comparatively recent history of industrially based social classes and a much longer history of rather egalitarian class relations. The origin of Norwegian egalitarian predates industrialism and the rise of the labor movement. The preindustrial economy was based largely on a small independent peasantry who combined agriculture with fishing (in the north) or with forestry (in the south). Because Norway was under foreign rule for five centuries until 1905, and because the topography is unfavorable for large estates, a strong aristocracy and landowner class did not emerge in most of Norway. There were some exceptions to this pattern, especially in the southern regions where a landowner class did exist. Norway’s early social and economic history engendered egalitarianism, although, as has been pointed out by several observers, it was an equality of poverty. ", "subqCount": 3, "appliedTo": ["S1-Q4", "S1-Q5", "S1-Q6"], "range": "S1 Q4-Q6"}, "G_788": {"poolId": "RCCR 788", "passage": "Washburn's examination of textile designs from the precolonial Kuba Kingdom in Africa reveals that, despite a theoretical embrace of infinite formal variation, there exists in practice a limited number of pattern structures, with creativity channeled into developing nuanced variations on those designs. A parallel sensibility informs the Kuba approach to the ndop figurative sculptures depicting paramount leaders. While one might assume royal portraits capture the unique image of each leader, in practice Kuba sculptors adapted a preferred figurative convention. Although the ndop figures themselves are so homogeneous that they are essentially expunged of any idiosyncratic physiognomic features, the embedded ibol signifier [a symbolic emblem incorporated into the base of each sculpture], and an accompanying explanatory proverb invest each image with a particular identity.", "passage_html": "<strong><span class=\"highlighted\">Washburn's examination</span></strong> of textile designs from the precolonial Kuba Kingdom in Africa reveals that, despite a theoretical embrace of infinite formal variation, there exists in practice a limited number of pattern structures, with creativity channeled into developing nuanced variations on those designs. A parallel sensibility informs the Kuba approach to the ndop figurative sculptures depicting paramount leaders. While one might assume royal portraits capture the unique image of each leader, in practice Kuba sculptors adapted a preferred figurative convention. Although the ndop figures themselves are so homogeneous that they are essentially expunged of any idiosyncratic physiognomic features, the embedded ibol signifier [a symbolic emblem incorporated into the base of each sculpture], and an accompanying explanatory proverb invest each image with a particular identity.", "subqCount": 2, "appliedTo": ["S2-Q4", "S2-Q5"], "range": "S2 Q4-Q5"}, "G_827": {"poolId": "RCCR 827", "passage": "In his splendid new biography of Flaubert, Frederick Brown deftly dismantles the most durable myth concerning the novelist—that Flaubert was miraculously transformed into a committed realist with the writing of Madame Bovary. Robert Baldick offers one version of the myth: “In his early works… Flaubert tended to give free rein to his flamboyant imagination, but on the advice of his friends he later disciplined his romantic exuberance in an attempt to achieve total objectivity and a harmonious prose style.” The only problem with this account is that it doesn’t stand up to scrutiny. Flaubert followed the realism of Madame Bovary with the fantastical Salammbô, and paired “A Simple Heart” with his hothouse fantasy, “Hérodias.”", "passage_html": "In his splendid new biography of Flaubert, Frederick Brown deftly dismantles the most durable myth concerning the novelist—that Flaubert was miraculously transformed into a committed realist with the writing of Madame Bovary. Robert Baldick offers one <span class=\"highlighted\">version</span> of the myth: “In his early works… Flaubert tended to give free rein to his flamboyant imagination, but on the advice of his friends he later disciplined his romantic exuberance in an attempt to achieve total objectivity and a harmonious prose style.” The only problem with this account is that it doesn’t stand up to scrutiny. <strong><span class=\"highlighted\">Flaubert followed the realism of Madame Bovary with the fantastical Salammbô, and paired “A Simple Heart” with his hothouse fantasy, “Hérodias.”</span></strong>", "subqCount": 2, "appliedTo": ["S2-Q6", "S2-Q7"], "range": "S2 Q6-Q7"}}, "bucketDistribution": {"TCSE": {"최상위": 4, "상위": 4, "중위": 3, "저빈도": 3}, "RCCR": {"최상위": 3, "상위": 3, "중위": 3, "저빈도": 4}}, "explanations": {"S1-Q1": {"interpretation": "Neltland 신용카드사들의 공격적 광고가 신용카드 계정 개설·소비를 유도하고 있다. 그러나 카드사 보고서에 따르면 카드당 평균 부채는 최근 몇 년간 5% 미만 증가에 그쳤고, 임금 상승이 이를 상쇄한다. 따라서 공격적 광고가 Neltland 시민에게 과도한 부채를 지우고 있다는 우려는 근거가 없다는 결론.", "strategy": "CR 8유형 > 약화·논박 (Weaken). 결론('우려는 근거 없음')의 비약은 '카드당 평균 부채 증가율 5% 미만' = '시민당 총 부채 증가율 5% 미만'으로 동일시한 점.", "correctReasoning": "약화 핵심: 1인당 보유 카드 수가 늘었다면 '카드당 부채'는 늘지 않아도 '1인당 총 부채'는 크게 늘 수 있다. (D) 대부분 Neltland 시민이 몇 년 전보다 훨씬 더 많은 카드를 보유한다 → 결론을 직접 약화. 정답 (D).", "wrongReasons": {"A": "(A) 평균 신용한도 증가 — 한도이지 실제 부채 증가가 아니라서 결론을 직접 약화하지 않음.", "B": "(B) 카드 결제 가능 사업체 증가 — 사용 기회 증가지만 부채 증가 직접 증명 아님.", "C": "(C) 카드사 경쟁으로 이자율 하락 — 부채 부담 완화 → 오히려 논증과 정합.", "E": "(E) 신청서 없이는 카드 발급 금지 — 발급 절차 문제일 뿐, 부채 증가 주장과 무관."}}, "S1-Q2": {"interpretation": "독학 예술가 Thornton Dial의 독창성은 그가 다룬 주제의 야심에 있었다. 그는 기억이나 성경 이야기를 기록하기보다 정치적 주제(여성 역할, 베트남전, 아프리카계 미국인의 역사 등)를 다뤘다. 호랑이 도상은 자신과 흑인 공동체의 상징.", "strategy": "RC 8유형 > 구체 내용 파악 (Consider each — 모두 고르기). 지문 첫 문장 \"Many self-taught artists start creating later in life\"가 Dial과의 공통점을 직접 명시.", "correctReasoning": "지문 첫 문장이 self-taught artists의 일반 특성으로 '늦은 시기에 시작'을 들고, Dial도 같은 패턴이다. (C) Dial did not begin his artistic career in his youth가 정답.", "wrongReasons": {"A": "(A) prettiness를 중시하지 않았다 — Dial 개인 특성으로 언급된 점이지 다른 self-taught artists의 공통점으로 진술되지 않음.", "B": "(B) 기억을 영감으로 사용했다 — 지문은 정반대: 다른 self-taught artists는 기억을 기록했지만 Dial은 그러지 않았다고 명시."}}, "S1-Q3": {"interpretation": "독학 예술가 Thornton Dial의 독창성은 그가 다룬 주제의 야심에 있었다. 그는 기억이나 성경 이야기를 기록하기보다 정치적 주제(여성 역할, 베트남전, 아프리카계 미국인의 역사 등)를 다뤘다. 호랑이 도상은 자신과 흑인 공동체의 상징.", "strategy": "RC 8유형 > 단어의 의미 (in context). 'recording memories or Bible stories' 문맥에서 'recording'의 정확한 함의.", "correctReasoning": "본문 'recording memories or Bible stories'는 기억·이야기를 작품으로 '표현·재현'한다는 뜻. (C) representing이 정확한 in-context 의미.", "wrongReasons": {"A": "(A) stating — 단순 진술. 시각 예술의 '재현'을 표현하기엔 부족.", "B": "(B) indicating — 가리키는 행위. 의미 약함.", "D": "(D) logging — 사실 기록(목록 작성). 예술 작품의 표현이 아님.", "E": "(E) confirming — 확인. 의미 부적합."}}, "S1-Q4": {"interpretation": "노르웨이는 독일과 같이 19세기 후반에 늦게 산업화했다. 그러나 독일과 달리 노르웨이는 산업화 이전부터 평등주의적 계급 관계의 역사가 길다. 그 뿌리는 산업화·노동운동 이전 시기에 있다. 농촌 노동 자원의 분포, 남부와 북부의 지리적 차이, 5세기에 걸친 외국 지배 경험 등이 노르웨이 평등주의의 기원을 형성.", "strategy": "RC 8유형 > 주제와 구성 (primary purpose).", "correctReasoning": "지문 전체가 노르웨이 평등주의의 뿌리(산업화 이전·외국 지배·지리·노동력 분포)를 다층적으로 설명. (D) roots of social equality in Norway가 정답.", "wrongReasons": {"A": "(A) 산업화 이전 국가의 빈곤과 평등 연결 — 일부만 다룸.", "B": "(B) 노르웨이와 독일이 공유하는 산업 사회 특성 — 둘은 비교되지만 핵심 주제 아님.", "C": "(C) 산업화가 노르웨이 사회·경제에 미친 효과 — 일부 다루지만 핵심은 산업화 '이전' 평등주의 뿌리.", "E": "(E) 노르웨이와 독일에서 사회 계급의 등장 — 등장 자체보다 평등주의 기원이 초점."}}, "S1-Q5": {"interpretation": "노르웨이는 독일과 같이 19세기 후반에 늦게 산업화했다. 그러나 독일과 달리 노르웨이는 산업화 이전부터 평등주의적 계급 관계의 역사가 길다. 그 뿌리는 산업화·노동운동 이전 시기에 있다. 농촌 노동 자원의 분포, 남부와 북부의 지리적 차이, 5세기에 걸친 외국 지배 경험 등이 노르웨이 평등주의의 기원을 형성.", "strategy": "RC 8유형 > 구체 내용 파악.", "correctReasoning": "본문은 남부 노르웨이에서 지주 계급이 형성됐고 북부에는 거의 없었음을 시사. (A) a landowning class was more likely to be found in southern Norway than in northern Norway가 정답.", "wrongReasons": {"B": "(B) 남부=어업, 북부=임업 — 본문과 반대 또는 단서 없음.", "C": "(C) 농업이 남부에서만 — 본문은 남부 농업, 북부 어업/임업 혼합 묘사. '북부에 농업 없음'은 과장.", "D": "(D) 남부가 먼저 산업화 — 본문 단서 없음.", "E": "(E) 외국 지배가 남부에 더 영향 — 본문 단서 없음."}}, "S1-Q6": {"interpretation": "노르웨이는 독일과 같이 19세기 후반에 늦게 산업화했다. 그러나 독일과 달리 노르웨이는 산업화 이전부터 평등주의적 계급 관계의 역사가 길다. 그 뿌리는 산업화·노동운동 이전 시기에 있다. 농촌 노동 자원의 분포, 남부와 북부의 지리적 차이, 5세기에 걸친 외국 지배 경험 등이 노르웨이 평등주의의 기원을 형성.", "strategy": "RC 8유형 > 추론 1 (직접 추론).", "correctReasoning": "본문은 노르웨이 평등주의가 대다수가 똑같이 가난한 상태에서 비롯됐다고 시사 — 따라서 평등주의가 반드시 높은 생활수준을 의미하지 않는다. (C) It did not necessarily provide a high standard of living for most Norwegians가 정답.", "wrongReasons": {"A": "(A) 5세기 외국 지배를 견디는 사회적 안정의 원천 — 본문은 외국 지배 경험과 평등주의 관계를 직접 인과로 단정하지 않음.", "B": "(B) 산업화 후에도 동일한 양상 — 본문 단서 약함.", "D": "(D) 다른 유럽보다 질적으로 다른 산업화 — 노조 운동에 대한 인과 단정 단서 부족.", "E": "(E) 남부에서 더 만연 — 본문은 정반대를 시사(북부가 더 평등적 관계)."}}, "S2-Q4": {"interpretation": "Washburn은 콜로니얼 이전 콩고 Kuba 왕국의 직물 디자인 분석에서, 이론적으로는 무한한 변주를 추구하지만 실제로는 제한된 패턴 구조 안에서 미묘한 변형을 만들어내는 창작 방식을 밝혀냈다. ndop 조각상에도 유사한 감수성이 적용된다 — 같은 형식 위에 미묘한 차이로 통치자를 식별.", "strategy": "RC 8유형 > 구체 내용 파악. ndop 조각상에 대한 본문의 정확한 진술 식별.", "correctReasoning": "본문은 ndop 조각상이 거의 동일한 얼굴 특징을 공유하면서 미묘한 ibol(상징물) 차이로 통치자를 식별한다고 명시. (B) There are minimal differences in their facial features가 정답.", "wrongReasons": {"A": "(A) ibol 신호자가 형식 변화가 거의 없다 — 정반대. ibol이 식별 핵심 변별.", "C": "(C) 역사적 인물 동일시가 현대 가정 — 본문 단서 없음.", "D": "(D) 개별 조각이 특정 직물 패턴과 결부 — 본문 단서 없음.", "E": "(E) 동반 격언을 통치자가 선택 — 본문 단서 없음."}}, "S2-Q5": {"interpretation": "Washburn은 콜로니얼 이전 콩고 Kuba 왕국의 직물 디자인 분석에서, 이론적으로는 무한한 변주를 추구하지만 실제로는 제한된 패턴 구조 안에서 미묘한 변형을 만들어내는 창작 방식을 밝혀냈다. ndop 조각상에도 유사한 감수성이 적용된다 — 같은 형식 위에 미묘한 차이로 통치자를 식별.", "strategy": "RC 8유형 > 언급 목적 (functional purpose of reference).", "correctReasoning": "글쓴이는 Washburn의 분석을 인용해 'Kuba 예술은 무한 변주가 아닌 제한된 구조 안의 미묘한 변형'이라는 점을 보여주며, 창의성 역할에 관한 일반 통념(무제한 변주)을 교정한다. (A) correct a misconception regarding the role of creativity in Kuba art가 정답.", "wrongReasons": {"B": "(B) 널리 받아들여진 이론 재확인 — Washburn 분석은 통념을 수정함, 재확인 아님.", "C": "(C) 두 예술 형식의 역사적 발전 비교 — 시간적 비교가 아니라 감수성 평행 강조.", "D": "(D) 두 장르의 유사성에 주의 환기 — 부분적으로 맞지만 핵심은 '오해 교정'.", "E": "(E) Kuba 예술가가 유명한 장르의 예시 — 본문 의도 아님."}}, "S1-Q7": {"interpretation": "자서전에서 영화 제작자는 자신의 사업 수완을 계속해서 ____한다 — 어떻게 다양한 연기자와 경쟁자를 다루었는지 그 통찰력을 지치도록 자세하게 늘어놓아서, 독자 중 그 내용을 신경 쓸 사람이 거의 없을 정도로.", "strategy": "18 Triggers > 비슷한 말 유도 / 분사구문 (going into wearying detail about his acumen)", "correctReasoning": "콜론·세미콜론 트리거는 없지만, 빈칸 뒤 \"going into wearying detail about his acumen\"(자신의 수완을 지치도록 자세히 늘어놓는다)는 빈칸의 의미를 설명하는 분사구문이다. '자신의 능력을 자랑하다'에 해당하는 vaunts가 정답이다.", "wrongReasons": {"bemoans": "'한탄하다' — 자기 능력을 한탄하지는 않는다. 뒤 분사구문(자세한 자랑)과 모순.", "disparages": "'폄하하다' — 자기 능력을 폄하하지 않는다. 동사 방향 반대.", "understates": "'축소해서 말하다' — 자세히 늘어놓는 모습과 정반대.", "adumbrates": "'개략적으로 윤곽만 그리다' — 분사구문이 '지치도록 자세히'라고 했으므로 윤곽만 그리는 것과 충돌."}}, "S1-Q8": {"interpretation": "어떤 지적 이점은 기존 학문 분야의 (i)____ 위치에 있음으로써 얻어질 때가 많다. 하지만 (ii)____ 사고의 중요성에 관한 주장을 받아들인다 하더라도, 그것이 유일하게 의미 있는 사고는 아니다.", "strategy": "18 Triggers > 반복·지칭 / 동격 — 두 빈칸은 같은 개념을 다르게 표현한 것 (i 위치 ⇄ ii 사고 방식)", "correctReasoning": "두 빈칸은 '기존 분야 외부에 위치한 사람의 사고'를 나타내야 한다. (i) on the periphery of(주변부에 있는)와 (ii) outsider(외부자) 사고가 의미적으로 호응한다. 빈칸 (i)가 학문 분야와의 관계(주변부)를, (ii)가 그에 따른 사고방식(외부자적)을 묘사한다.", "wrongReasons": {"aware of trends in / intuitive": "(i)단순 인지·(ii)직관적 — 둘 다 '주변부/외부자' 의미를 담지 못함.", "deeply indebted to / arbitrary": "(i)깊이 빚지고 있는·(ii)임의적 — '깊이 빚진'은 내부자에 가까워 핵심 아이디어와 충돌."}}, "S1-Q9": {"interpretation": "고전 문학의 영화 각색이 활기 없는 이유는 문학의 문화적 위세에 대해 (ii)____를 (i)____하기 때문이다. 좋은 작품은 위대한 소설을 (iii)____ 인공물이 아니라 감독의 의지대로 빚어낼 흥미로운 재료 덩어리로 본다는 오만한 가정 덕에 성공한다.", "strategy": "18 Triggers > 대조와 역접 (by contrast) + 비교의 대상 — 첫 문장(원작에 굴종)과 두 번째 문장(원작을 재료로 봄)이 대조", "correctReasoning": "by contrast 트리거가 두 문장을 정반대로 묶는다. 좋은 영화는 원작을 '소재'로 본다 → 나쁜 영화는 원작을 '신성한 대상'으로 모신다. (i) display(드러내다) + (ii) obeisance(경의) → 원작에 경의를 표하므로, (iii) sacred(신성한)와 호응한다.", "wrongReasons": {"invite / hostility / sacred": "hostility(적대)는 경의가 아니라 반대 방향. by contrast 트리거 방향과 모순.", "eschew / indifference / generic": "eschew(회피)+indifference(무관심)는 '원작을 무시'에 해당해 나쁜 영화 묘사가 아님. generic은 sacred와 의미가 다름."}}, "S1-Q10": {"interpretation": "눈 덮인 호수 표면은 ____의 안심되는 환상을 보여주지만, 눈 아래 얼음은 위험한 균열로 갈라져 있다.", "strategy": "18 Triggers > 대조와 역접 (but) — 표면의 환상과 실제 갈라진 얼음이 대조", "correctReasoning": "but이 빈칸과 '균열'을 대조시킨다. 빈칸은 '튼튼함/단단함'에 해당해야 한다. substantiality(견고함)와 soundness(건전함·튼튼함)는 동의어 쌍으로 안전 SE 답이 된다.", "wrongReasons": {"uniformity": "균일함 — 단일 어휘로는 의미가 통하지만 짝(쌍)이 없음.", "isolation": "고립 — but-대조 의미('안전함의 환상')와 부합하지 않음.", "seclusion": "은둔 — 위와 같이 의미 부적합.", "protection": "보호 — 의미는 비슷할 수 있으나 SE 동의어 쌍이 없음."}}, "S1-Q11": {"interpretation": "나노과학/나노기술에서 surface(표면) 개념의 중요성은 ____될 수 없다. 사실, 나노 물질에서는 질량 특성이 아니라 표면 현상이 화학적·생물학적 거동을 지배한다.", "strategy": "18 Triggers > 인과관계 (in fact, … govern) — 표면 현상이 지배한다는 사실이 '중요성'을 뒷받침", "correctReasoning": "콜론(:) 뒤 부연이 \"표면 현상이 지배한다\"이므로 빈칸은 '중요성을 ____할 수 없다 = 아무리 과장해도 부족하다'의 의미. cannot be overstated/exaggerated가 정확한 동의어 쌍.", "wrongReasons": {"dismissed": "무시하다 — '무시될 수 없다' 자체는 말이 되지만 SE 동의어 쌍이 없음.", "comprehended": "이해하다 — 의미가 핵심에서 벗어남.", "intuited": "직관적으로 알다 — 의미 부적합.", "verified": "검증되다 — 의미 부적합."}}, "S1-Q12": {"interpretation": "Cynthia Molloy는 단순하고 춤출 수 있는 비트보다 복잡한 기타 솔로를 더 우대하는 록 팬덤을 ____한다 — 그것을 기술적 능숙함의 '무의미한 숭배'라고 부르면서.", "strategy": "18 Triggers > 분사구문 (calling it the \"mindless veneration\"…) — 빈칸 뒤 분사구문이 빈칸 동사를 정의", "correctReasoning": "calling it the \"mindless veneration\"이라는 부정적 인용은 비판/조롱을 의미. 따라서 빈칸은 '조롱하다/비웃다'. derides(조롱하다)와 scorns(경멸하다)가 동의어 쌍.", "wrongReasons": {"misreads": "잘못 읽다 — 비판이 아니라 오해. 분사구문의 강한 비판 의미와 약함.", "undervalues": "저평가하다 — 비판이지만 derides/scorns만큼 강도가 낮음; SE 동의어 쌍이 약함.", "excuses": "용서·변명하다 — 비판과 반대 방향.", "condones": "용인하다 — 비판과 반대 방향."}}, "S2-Q2": {"interpretation": "최근 논쟁적 연구에 따르면 미국 산림이 흡수하는 이산화탄소가 미국 화석연료 연소로 배출되는 양보다 많을 수 있다. 두 가지 함의: 미국이 대기 CO2 증가에 직접 기여하지 않을 수 있고, 대기가 일부 자정 능력을 보일 수 있다. 그러나 이는 환경 보호 노력의 결과가 아니라 자연적 흡수 능력일 수 있다는 저자 논증.", "strategy": "CR 8유형 > 약화·논박 (Weaken). 저자 주장 — 미국의 더 큰 CO2 흡수능력은 '환경 보호 노력 결과 아님'.", "correctReasoning": "저자 주장의 핵심은 '흡수 우위는 자연적 사실이지 정책 결과가 아니다'. 만약 미국이 의도적으로 CO2 배출을 줄인 결과라면 정책 결과로 해석될 여지가 생긴다 → 저자 주장을 약화. (B) 미국이 의도적으로 화석연료 CO2 배출을 줄여왔다.", "wrongReasons": {"A": "(A) 비화석 에너지 소비 의도적 증가 — 배출이 아니라 에너지원 변화, 부분적 관련만.", "C": "(C) 환경 관련 입장 변화 — 너무 일반적, 직접 약화 아님.", "D": "(D) 다른 가스도 배출 — CO2 균형 논의와 무관.", "E": "(E) 화석연료 CO2가 대기 CO2의 다수가 아니다 — 다른 출처 강조이나 미국 흡수능력 주장과 무관."}}, "S2-Q3": {"interpretation": "최근 논쟁적 연구에 따르면 미국 산림이 흡수하는 이산화탄소가 미국 화석연료 연소로 배출되는 양보다 많을 수 있다. 두 가지 함의: 미국이 대기 CO2 증가에 직접 기여하지 않을 수 있고, 대기가 일부 자정 능력을 보일 수 있다. 그러나 이는 환경 보호 노력의 결과가 아니라 자연적 흡수 능력일 수 있다는 저자 논증.", "strategy": "CR 8유형 > 전제 (Assumption — Consider each — 모두 고르기). 저자가 화석연료 흡수 비교만으로 결론을 내리려면 비-화석 배출원이 무시 가능해야 한다.", "correctReasoning": "(A) 미국이 화석연료 외 다른 출처에서 의미 있는 CO2를 배출하지 않는다 → 이 전제가 없으면 산림 흡수량 > 화석연료 배출량 비교만으로 '미국 전체 CO2 균형'을 논할 수 없다. 정답 (A).", "wrongReasons": {"B": "(B) 최근 CO2 배출이 증가하지 않았다 — 변화 추세가 아니라 절대량 비교가 핵심.", "C": "(C) 미국 화석연료 CO2 < 타국 — 국가 간 비교가 논점 아님."}}, "S2-Q8": {"interpretation": "바다에서 위도와 온도의 엄격한 관계는 해류에 의해 해안에서 ____된다. 따뜻한 해류는 열대·아열대 온도를 극지방으로 확장하고, 차가운 해류는 이 위도의 온도를 낮춘다.", "strategy": "18 Triggers > 콜론·세미콜론 (콜론 뒤 부연이 빈칸의 의미 정의)", "correctReasoning": "콜론 뒤 \"warm currents extend tropical temperatures poleward, while cool currents lower temperatures\"는 위도-온도 관계가 '바뀐다/수정된다'는 의미를 부연. modified(수정된다)가 정답.", "wrongReasons": {"amplified": "증폭된다 — 부연은 '확장·낮춤' 양방향이므로 단순 증폭이 아님.", "manifested": "발현된다 — 관계가 새로 드러나는 게 아니라 변형됨.", "reinvigorated": "재활성화된다 — 의미가 부연과 맞지 않음.", "maintained": "유지된다 — 부연이 변화를 묘사하므로 반대 방향."}}, "S2-Q9": {"interpretation": "상원의원이 재선에 관심이 없다고 대중을 설득하려는 시도는, 상대 후보가 자신이 출마할 의도를 감추려 한 시도만큼 ____했다.", "strategy": "18 Triggers > 비교의 대상 (as ___ as) — 두 시도를 같은 성질로 묶음", "correctReasoning": "상대가 실제 의도를 감추려 시도하는 것은 '진실하지 않은(disingenuous)' 행동. 상원의원도 그만큼 disingenuous. 정답 (C) disingenuous.", "wrongReasons": {"impetuous": "충동적인 — 의도적 은폐와 다름.", "inadvertent": "부주의한 — 의도적 거짓말과 반대.", "indecisive": "우유부단한 — 거짓 동기 숨김과 다름.", "remote": "동떨어진 — 의미 부적합."}}, "S2-Q10": {"interpretation": "문학 번역에 대한 한 가지 급진적 접근은 원작의 (ii)____ 재현을 (i)____하고 단순히 새로운 작품을 — 다만 원작에서 영감을 받은 방식으로 — 구성하는 것이다.", "strategy": "18 Triggers > 대조와 역접 (and simply to compose a new work) — '재현 포기 ↔ 새 작품 작성'", "correctReasoning": "급진적 접근은 '원작 충실 재현'을 포기하고 새 작품을 쓰는 것. (i) despair of(단념하다) + (ii) faithful(충실한) → '충실한 재현을 단념하고 새 작품을 쓴다'가 자연스럽다.", "wrongReasons": {"resign oneself to / faithful": "(i) 체념하여 받아들이다 — 'and simply to compose'와 충돌(받아들이면 새 작품 안 씀).", "aim for / dense": "(i) 목표로 한다 — 'simply compose a new work' 흐름과 반대 방향. dense는 '충실한'과 의미가 다름."}}, "S2-Q11": {"interpretation": "비평가가 가끔 만나는 어떤 소설은 (i)____(결함·서툰 점)이 너무 많고 (ii)____ 해서, 완전히 교정하면 본래 소설보다 더 긴 텍스트가 될 것이다. 그런 책은 그저 조용히 가라앉게 두고 싶다 — 다른 수천 권의 (iii)____ 책들이 천천히 분해되는 그 자리에.", "strategy": "18 Triggers > 인과관계 (so … that) + 반복·지칭 — 세 빈칸이 모두 '나쁜 책'을 묘사", "correctReasoning": "so ___ that 구문이 '교정량 ≥ 소설 자체'라는 결과를 만들어내므로 (i)는 negative=ineptitudes ired 'A Simple Heart' with his hothouse fantasy, 'Hérodias.'\" 이 문장은 플로베르가 현실주의로 '변신'한 것이 아니라 현실과 환상을 교차한 증거를 제시 → 통설을 약화. (D) provide evidence undermining a conventional view regarding Flaubert가 정답.", "wrongReasons": {"A": "(A) 플로베르 소설가로서의 폭 — 폭이 아니라 통설 반박 증거.", "B": "(B) 자주 간과되는 작품 식별 — 작품 인지도가 아니라 기능 분석.", "C": "(C) Madame Bovary가 문체 발전의 전환점임을 보여줌 — 정반대(전환점이 아니라는 증거).", "E": "(E) 비평가들이 Madame Bovary를 과대평가했다 — 본문에서 그런 주장 없음."}}}};

      <div class="intro-eyebrow">GRE Verbal Reasoning</div>
      <h1 class="intro-title">${escapeHtml(examData.title)}</h1>
      <div class="intro-subtitle">${escapeHtml(examData.titleLine2)}</div>

      <div class="main-copy">감으로 찍는 적중이 아닌<br>과학적 통계를 바탕으로<br>출제된 빈출문제 모의고사</div>
      <div class="author">${escapeHtml(examData.intro.author)}</div>

      <div class="info-card">
        <div class="info-row"><span class="label">총 섹션 수</span><span class="value">2 Sections</span></div>

        <div class="info-row"><span class="label">Section 2</span><span class="value">${s2.questions.length} questions · ${s2.timeLimit} min</span></div>
        <div class="info-row"><span class="label">총 문항 수</span><span class="value">${totalQ} questions</span></div>
        <div class="info-row"><span class="label">채점 방식</span><span class="value">round(1.481 × correct) + 130</span></div>
      </div>

      <ul class="intro-bullets">
        <li>각 섹션은 독립된 타이머로 진행되며, 시간이 종료되면 자동으로 다음 섹션으로 넘어갑니다.</li>
        <li>섹션 내에서는 자유롭게 이전 문제로 돌아가거나 건너뛸 수 있습니다.</li>
        <li>섹션을 완료하면 해당 섹션의 답안을 변경할 수 없습니다.</li>

}

function startExam() {
  examData.sections.forEach((s, i) => { state.timers[i] = s.timeLimit * 60; });
  state.sectionIdx = 0;
  state.qIdx = 0;
  state.screen = 'sectionStart';
  render();
}

/* ===== Section start page ===== */
function renderSectionStart() {
  const sect = examData.sections[state.sectionIdx];
  const ordinal = state.sectionIdx === 0 ? '첫 번째' : '두 번째';
  app.innerHTML = `
    <div class="section-start">
      <div class="section-start-eyebrow">SECTION ${sect.number} OF ${examData.sections.length}</div>
      <div class="section-start-card">
        <h2 class="section-start-title">${ordinal} 섹션을 시작합니다</h2>
        <div class="section-start-info"><strong>${sect.questions.length}개 문항</strong> · 제한 시간 <strong>${sect.timeLimit}분</strong></div>
        <div class="section-start-hint">시작 버튼을 누르면 타이머가 작동합니다.</div>
        <button class="section-start-btn" onclick="beginSection()">Section ${sect.number} 시작</button>
      </div>
    </div>`;
}
function beginSection() {
  state.screen = 'section';
  startTimer();
  render();
}

function startTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    if (state.timers[state.sectionIdx] > 0) { state.timers[state.sectionIdx]--; updateTimerDisplay(); }
    else { goToSectionComplete(); }
  }, 1000);
}
function updateTimerDisplay() {
  const t = state.timers[state.sectionIdx];
  const min = Math.floor(t/60), sec = t%60;
  const el = document.querySelector('.timer');
  if (el) { el.textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; if (t <= 60) el.classList.add('warn'); }
}
function pauseTimer() { if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; } }

function renderSection() {
  const sect = examData.sections[state.sectionIdx];
  const q = sect.questions[state.qIdx];
  const t = state.timers[state.sectionIdx];
  const min = Math.floor(t/60), sec = t%60;
  app.innerHTML = `
    <div class="section-header">
      <div class="section-title">Section ${sect.number} · ${sect.questions.length}문항</div>
      <div class="timer ${t<=60?'warn':''}">${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}</div>
    </div>
    <div id="qbox">${renderQuestion(q)}</div>
    <div class="nav-bar">
      <button onclick="prevQ()" ${state.qIdx===0?'disabled':''}>← 이전</button>
      <div class="progress">${state.qIdx+1} / ${sect.questions.length}</div>
      ${state.qIdx === sect.questions.length-1
        ? '<button class="next-section" onclick="goToSectionComplete()">섹션 완료 →</button>'
        : '<button onclick="nextQ()">다음 →</button>'}
    </div>`;
  attachHandlers(q);
}

function renderQuestion(q) {
  if (q.type === 'TC') return renderTC(q);
  if (q.type === 'SE') return renderSE(q);
  if (q.type === 'CR') return renderCR(q);
  return renderRC(q);
}

function renderTC(q) {
  const ans = state.answers[q.id] || {}; const value = ans.value || {};
  const nBlanks = q.blanks.length;
  let h = `<div class="qcard"><div class="qhead"><span class="qnum">${q.id}</span> Text Completion</div>`;
  h += `<div class="stem">${escapeHtml(q.questionText)}</div><div class="tc-wrap">`;
  if (nBlanks === 1) {
    h += `<table class="tc-table cols-1"><tbody>`;
    q.blanks[0].choices.forEach(opt => {
      const sel = value['i'] === opt.label ? ' selected' : '';
      h += `<tr><td class="tc-cell${sel}" data-blank="i" data-value="${escapeHtml(opt.label)}">${escapeHtml(opt.text)}</td></tr>`;
    });
    h += `</tbody></table>`;
  } else {
    h += `<table class="tc-table cols-${nBlanks}"><thead><tr>`;
    q.blanks.forEach(b => h += `<th>Blank (${b.id})</th>`);
    h += `</tr></thead><tbody>`;
    const nRows = q.blanks[0].choices.length;
    for (let r = 0; r < nRows; r++) {
      h += `<tr>`;
      q.blanks.forEach(b => {
        const opt = b.choices[r];
        const sel = value[b.id] === opt.label ? ' selected' : '';
        h += `<td class="tc-cell${sel}" data-blank="${b.id}" data-value="${escapeHtml(opt.label)}">${escapeHtml(opt.text)}</td>`;
      });
      h += `</tr>`;
    }
    h += `</tbody></table>`;
  }
  return h + `</div></div>`;
}

function attachTCHandlers(q) {
  document.querySelectorAll('.tc-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const blank = cell.dataset.blank;
      document.querySelectorAll(`.tc-cell[data-blank="${blank}"]`).forEach(c => c.classList.remove('selected'));
      cell.classList.add('selected');
      if (!state.answers[q.id]) state.answers[q.id] = {value: {}};
      if (!state.answers[q.id].value) state.answers[q.id].value = {};
      state.answers[q.id].value[blank] = cell.dataset.value;
    });
  });
}

function renderSE(q) {
  const ans = (state.answers[q.id] || {}).value || [];
  let h = `<div class="qcard"><div class="qhead"><span class="qnum">${q.id}</span> Sentence Equivalence</div>`;
  h += `<div class="stem">${escapeHtml(q.questionText)}</div>`;
  h += `<div class="se-warning ${ans.length>2?'err':''}">정답 2개를 선택하세요. (현재 ${ans.length}개)</div>`;
  h += `<ul class="choice-list">`;
  q.choices.forEach(c => {
    const sel = ans.includes(c.label) ? ' selected' : '';
    h += `<li class="se-choice${sel}" data-value="${escapeHtml(c.label)}"><span class="sq-marker"></span><span>${escapeHtml(c.text)}</span></li>`;
  });
  return h + `</ul></div>`;
}

function attachSEHandlers(q) {
  document.querySelectorAll('.se-choice').forEach(el => {
    el.addEventListener('click', () => {
      const val = el.dataset.value;
      if (!state.answers[q.id]) state.answers[q.id] = {value: []};
      let arr = state.answers[q.id].value || [];
      if (arr.includes(val)) { arr = arr.filter(x => x !== val); el.classList.remove('selected'); }
      else { if (arr.length >= 2) return; arr = [...arr, val]; el.classList.add('selected'); }
      state.answers[q.id].value = arr;
      const w = document.querySelector('.se-warning');
      if (w) { w.textContent = `정답 2개를 선택하세요. (현재 ${arr.length}개)`; w.classList.toggle('err', arr.length > 2); }
    });
  });
}

function renderCR(q) {
  const ans = (state.answers[q.id] || {}).value;
  let h = `<div class="rc-grid">`;
  const stim = q.stimulus_html || escapeHtml(q.stimulus || '');
  h += `<div class="passage-box"><div class="passage-meta">${q.id} · Critical Reasoning</div><div class="passage-body">${stim}</div></div>`;
  h += `<div class="question-col"><div class="qpos">${q.id}</div>`;
  h += `<div class="stem">${escapeHtml(q.questionText)}</div>`;
  h += `<ul class="choice-list">`;
  q.choices.forEach(c => {
    const sel = ans === c.label ? ' selected' : '';
    h += `<li class="rc-choice oval${sel}" data-value="${escapeHtml(c.label)}"><span class="oval-marker"></span><span>${escapeHtml(c.text)}</span></li>`;
  });
  return h + `</ul></div></div>`;
}
function attachCRHandlers(q) {
  document.querySelectorAll('.rc-choice').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.rc-choice').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      if (!state.answers[q.id]) state.answers[q.id] = {};
      state.answers[q.id].value = el.dataset.value;
    });
  });
}

function renderRC(q) {
  const pg = examData.passageGroups[q.passageGroupId];
  const range = pg.range || q.id;
  const ans = state.answers[q.id] || {};
  const isMulti = q.type === 'RC_MULTI';
  const passageBody = pg.passage_html || escapeHtml(pg.passage);
  let h = `<div class="rc-grid">`;
  h += `<div class="passage-box"><div class="passage-meta">${range} · Reading Comprehension</div><div class="passage-body">${passageBody}</div></div>`;
  h += `<div class="question-col"><div class="qpos">${q.id}${pg.appliedTo.length>1 ? ' ('+(pg.appliedTo.indexOf(q.id)+1)+'/'+pg.appliedTo.length+')' : ''}</div>`;
  if (q.directions) h += `<div class="directive">${escapeHtml(q.directions)}</div>`;
  h += `<div class="stem">${escapeHtml(q.questionText)}</div>`;
  const selectedArr = isMulti ? (ans.value || []) : null;
  const single = !isMulti ? ans.value : null;
  const mClass = isMulti ? 'sq-marker' : 'oval-marker';
  h += `<ul class="choice-list">`;
  q.choices.forEach(c => {
    const sel = isMulti ? (selectedArr.includes(c.label) ? ' selected' : '') : (single === c.label ? ' selected' : '');
    h += `<li class="rc-choice${sel}" data-value="${escapeHtml(c.label)}" data-multi="${isMulti}"><span class="${mClass}"></span><span>${escapeHtml(c.text)}</span></li>`;
  });
  return h + `</ul></div></div>`;
}
function attachRCHandlers(q) {
  const isMulti = q.type === 'RC_MULTI';
  document.querySelectorAll('.rc-choice').forEach(el => {
    el.addEventListener('click', () => {
      const val = el.dataset.value;
      if (isMulti) {
        if (!state.answers[q.id]) state.answers[q.id] = {value: []};
        let arr = state.answers[q.id].value || [];
        if (arr.includes(val)) { arr = arr.filter(x => x !== val); el.classList.remove('selected'); }
        else { arr = [...arr, val]; el.classList.add('selected'); }
        state.answers[q.id].value = arr;
      } else {
        document.querySelectorAll('.rc-choice').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
        if (!state.answers[q.id]) state.answers[q.id] = {};
        state.answers[q.id].value = val;
      }
    });
  });
}

function attachHandlers(q) {
  if (q.type === 'TC') attachTCHandlers(q);
  else if (q.type === 'SE') attachSEHandlers(q);
  else if (q.type === 'CR') attachCRHandlers(q);
  else attachRCHandlers(q);
}

function nextQ() { const sect = examData.sections[state.sectionIdx]; if (state.qIdx < sect.questions.length - 1) { state.qIdx++; render(); } }
function prevQ() { if (state.qIdx > 0) { state.qIdx--; render(); } }

function goToSectionComplete() { pauseTimer(); state.screen = 'sectionComplete'; render(); }
function renderSectionComplete() {
  const sect = examData.sections[state.sectionIdx];
  const t = state.timers[state.sectionIdx];
  const elapsed = sect.timeLimit*60 - t;
  const minE = Math.floor(elapsed/60), secE = elapsed%60;
  let answered = 0;
  sect.questions.forEach(q => {
    const a = state.answers[q.id]; if (!a) return;
    if (q.type === 'TC') { if (a.value && Object.keys(a.value).length === q.blanks.length) answered++; }
    else if (q.type === 'SE') { if ((a.value || []).length === 2) answered++; }
    else if (q.type === 'RC_MULTI') { if ((a.value || []).length > 0) answered++; }
    else { if (a.value) answered++; }
  });
  const isLast = state.sectionIdx === examData.sections.length - 1;
  const cText = isLast ? '완료하고 채점 →' : '완료하고 다음 섹션 →';
  const cLabel = cText.replace(' →','');
  const cCls = isLast ? 'confirm-btn final' : 'confirm-btn';
  app.innerHTML = `
    <div class="section-complete">
      <h2>Section ${sect.number} 풀이 완료</h2>
      <div class="complete-stats">
        <div><div class="label">소요 시간</div><div class="value">${String(minE).padStart(2,'0')}:${String(secE).padStart(2,'0')} / ${String(sect.timeLimit).padStart(2,'0')}:00</div></div>
        <div><div class="label">응답한 문항</div><div class="value">${answered} / ${sect.questions.length}</div></div>
      </div>
      <div class="warning-box">
        <p>⚠️ "${cLabel}" 버튼을 누르면 Section ${sect.number}의 답안은<br><strong>더 이상 수정할 수 없습니다.</strong></p>
        ${state.timers[state.sectionIdx] > 0 ? '<p>남은 시간이 있으니 풀이로 돌아가<br>검토할 수 있습니다.</p>' : ''}
      </div>
      <div class="complete-actions">
        ${state.timers[state.sectionIdx] > 0 ? '<button class="back-btn" onclick="backToSection()">← 풀이 화면으로</button>' : ''}
        <button class="${cCls}" onclick="confirmSectionComplete()">${cText}</button>
      </div>
    </div>`;
}
function backToSection() { state.screen='section'; startTimer(); render(); }
function confirmSectionComplete() {
  state.lockedSections[state.sectionIdx] = true;
  if (state.sectionIdx < examData.sections.length - 1) {
    state.sectionIdx++; state.qIdx = 0; state.screen = 'sectionStart';  /* show section start page */
    render();
  } else { submitExam(); }
}
function submitExam() { pauseTimer(); state.screen='results'; render(); }

function scoreQuestion(q) {
  const ansObj = state.answers[q.id] || {};
  if (q.type === 'TC') {
    const cByB = {}; q.blanks.forEach((b, i) => { cByB[b.id] = q.answer[i]; });
    const mByB = ansObj.value || {};
    const ok = q.blanks.every(b => mByB[b.id] === cByB[b.id]);
    return { correct: q.answer.join(', '), mine: q.blanks.map(b => mByB[b.id] || '—').join(', '), ok, mineByBlank: mByB };
  } else if (q.type === 'SE') {
    const c = (q.answer || []).slice().sort(); const m = (ansObj.value || []).slice().sort();
    const ok = c.length === m.length && c.every((x,i) => x === m[i]);
    return { correct: c.join(', '), mine: m.join(', '), ok, mineArr: m, correctArr: c };
  } else if (q.type === 'CR' || q.type === 'RC_SINGLE') {
    const c = q.answer[0]; const m = ansObj.value;
    return { correct: c, mine: m || '', ok: m === c };
  } else if (q.type === 'RC_MULTI') {
    const c = (q.answer || []).slice().sort(); const m = (ansObj.value || []).slice().sort();
    const ok = c.length === m.length && c.every((x,i) => x === m[i]);
    return { correct: c.join(''), mine: m.join(''), ok, mineArr: m, correctArr: c };
  }
  return { correct:'', mine:'', ok:false };
}

function renderResults() {
  let okC=0, totC=0; const rows=[];
  examData.sections.forEach(s => { s.questions.forEach(q => { const r = scoreQuestion(q); rows.push({q,r}); totC++; if (r.ok) okC++; }); });
  const mult = examData.scoringFormula.multiplier, base = examData.scoringFormula.base;
  const scaled = Math.round(okC * mult) + base;
  let h = `
    <div class="results">
      <h2>채점 결과</h2>
      <div class="score-summary">
        <div class="score-item"><div class="label">정답 / 총문항</div><div class="value">${okC} / ${totC}</div></div>
        <div class="score-item"><div class="label">환산 점수</div><div class="value">${scaled}</div></div>
        <div class="score-item"><div class="label">정답률</div><div class="value">${Math.round(okC/totC*100)}%</div></div>
        <div class="score-item"><div class="label">점수 공식</div><div class="value" style="font-size:1em">round(${okC}×${mult}) + ${base}</div></div>
      </div>
      <div class="meta-notice">
        ※ 각 해설의 <strong>총 출제 횟수</strong>와 <strong>출제 연월</strong>은 본 강사 자체 통계 기준입니다.<br>
        ※ 같은 달에 여러 번 출제된 문제는 출제 연월보다 출제 횟수가 많을 수 있습니다.
      </div>
      <div class="actions">
        <button onclick="expandAllExp()">모두 펼치기</button>
        <button onclick="collapseAllExp()">모두 접기</button>
        <button onclick="window.print()">인쇄</button>
      </div>
      <table class="results-table">
        <thead><tr><th>ID</th><th>모음집</th><th>유형</th><th>빈도구간</th><th>내 답</th><th>정답</th><th>O/X</th><th>해설</th></tr></thead>
        <tbody>`;
  rows.forEach((row, i) => {
    const okMark = row.r.ok ? '<span class="ok">✓</span>' : '<span class="ng">✗</span>';
    const mD = row.r.mine ? escapeHtml(String(row.r.mine).slice(0, 80)) : '<span style="color:#999">—</span>';
    h += `<tr><td>${row.q.id}</td><td>${escapeHtml(row.q.poolId)}</td><td>${row.q.type.replace('RC_','')}</td><td>${row.q.bucket}</td><td>${mD}</td><td>${escapeHtml(String(row.r.correct).slice(0, 80))}</td><td>${okMark}</td><td><button class="exp-toggle" data-row="${i}" onclick="toggleExp(${i})">▶ 해설</button></td></tr>`;
    h += `<tr class="exp-row" id="exp-row-${i}" style="display:none"><td colspan="8">${renderExplanationGrid(row)}</td></tr>`;
  });
  h += `</tbody></table></div>`;
  app.innerHTML = h;
}

function renderExplanationGrid(row) {
  const q = row.q;
  return `<div class="exp-grid">
    <div class="exp-pane"><div class="exp-pane-header">▣ 풀이 다시보기</div>${renderQuestionReplay(q, row.r)}</div>
    <div class="exp-pane"><div class="exp-pane-header">▤ 해설</div>${renderExplanationContent(q, row.r)}</div>
  </div>`;
}

function renderQuestionReplay(q, r) {
  let h = '';
  const isRCCR = (q.type === 'CR' || q.type.startsWith('RC_'));
  if (isRCCR) {
    const pg = examData.passageGroups[q.passageGroupId];
    let body = q.type === 'CR' ? (q.stimulus_html || escapeHtml(q.stimulus||'')) : ((pg && pg.passage_html) || escapeHtml(pg && pg.passage || ''));
    h += `<div class="replay-passage">${body}</div>`;
    if (q.directions) h += `<div class="replay-directive">${escapeHtml(q.directions)}</div>`;
    h += `<div class="replay-stem">${escapeHtml(q.questionText)}</div>`;
    const isMulti = q.type === 'RC_MULTI';
    const mClass = isMulti ? 'marker-sq' : 'marker-oval';
    const cSet = new Set(q.answer || []);
    const mSet = new Set(isMulti ? (r.mineArr || []) : (r.mine ? [r.mine] : []));
    h += `<ul class="replay-list">`;
    q.choices.forEach(c => {
      const isC = cSet.has(c.label); const isM = mSet.has(c.label); const isWM = isM && !isC;
      const cls = isC ? ' is-correct' : (isWM ? ' is-wrong-mine' : '');
      h += `<li class="${cls.trim()}"><span class="${mClass}"></span><span>${escapeHtml(c.text)}${isC ? ' <strong>← 정답</strong>' : ''}${isWM ? ' <strong>← 내 선택 ✗</strong>' : (isM ? ' <strong>← 내 선택 ✓</strong>' : '')}</span></li>`;
    });
    h += `</ul>`;
  } else if (q.type === 'TC') {
    h += `<div class="replay-stem">${escapeHtml(q.questionText)}</div>`;
    const nB = q.blanks.length;
    if (nB === 1) {
      h += `<table class="replay-table"><tbody>`;
      const c = q.answer[0]; const m = (r.mineByBlank || {})['i'];
      q.blanks[0].choices.forEach(opt => {
        const isC = opt.label === c; const isM = opt.label === m;
        const cls = isC ? ' class="is-correct"' : (isM && !isC ? ' class="is-wrong-mine"' : '');
        h += `<tr><td${cls}>${escapeHtml(opt.text)}${isC ? ' ← 정답' : (isM && !isC ? ' ← 내 선택 ✗' : (isM ? ' ← 내 선택 ✓' : ''))}</td></tr>`;
      });
      h += `</tbody></table>`;
    } else {
      h += `<table class="replay-table"><thead><tr>`;
      q.blanks.forEach(b => h += `<th>Blank (${b.id})</th>`);
      h += `</tr></thead><tbody>`;
      const nR = q.blanks[0].choices.length;
      for (let r2 = 0; r2 < nR; r2++) {
        h += `<tr>`;
        q.blanks.forEach((b, idx) => {
          const opt = b.choices[r2]; const c = q.answer[idx]; const m = (r.mineByBlank || {})[b.id];
          const isC = opt.label === c; const isM = opt.label === m;
          const cls = isC ? ' class="is-correct"' : (isM && !isC ? ' class="is-wrong-mine"' : '');
          h += `<td${cls}>${escapeHtml(opt.text)}</td>`;
        });
        h += `</tr>`;
      }
      h += `</tbody></table>`;
      h += `<div style="font-size:.88em;color:var(--ink-mute);margin-top:6px">정답: <strong>${escapeHtml(q.answer.join(', '))}</strong> / 내 선택: <strong>${escapeHtml(q.blanks.map(b => (r.mineByBlank || {})[b.id] || '—').join(', '))}</strong></div>`;
    }
  } else if (q.type === 'SE') {
    h += `<div class="replay-stem">${escapeHtml(q.questionText)}</div>`;
    const cSet = new Set(r.correctArr || []); const mSet = new Set(r.mineArr || []);
    h += `<ul class="replay-list">`;
    q.choices.forEach(c => {
      const isC = cSet.has(c.label); const isM = mSet.has(c.label); const isWM = isM && !isC;
      const cls = isC ? ' is-correct' : (isWM ? ' is-wrong-mine' : '');
      h += `<li class="${cls.trim()}"><span class="marker-sq"></span><span>${escapeHtml(c.text)}${isC ? ' <strong>← 정답</strong>' : ''}${isWM ? ' <strong>← 내 선택 ✗</strong>' : (isM ? ' <strong>← 내 선택 ✓</strong>' : '')}</span></li>`;
    });
    h += `</ul>`;
  }
  return h;
}

function renderExplanationContent(q, r) {
  const exp = examData.explanations[q.id];
  if (!exp) return '<p>해설이 준비되지 않았습니다.</p>';
  const freq = q.frequency;
  const months = (freq.months || []).join(', ');
  const okCls = r.ok ? 'correct' : (r.mine ? 'wrong' : 'none');
  const mD = r.mine ? escapeHtml(String(r.mine)) : '—';
  let h = `<div class="exp-meta-box">
    <div class="meta-row"><span class="meta-label">모음집 ID</span><span class="meta-value big">${escapeHtml(q.poolId)}</span></div>
    <div class="meta-row" style="margin-top:6px"><span class="meta-label">출제 횟수</span><span class="meta-value big">${freq.count}회</span></div>
    <div class="meta-row" style="margin-top:6px"><span class="meta-label">출제 연월</span><span class="meta-value">${escapeHtml(months || '—')}</span></div>
    <div class="meta-row" style="margin-top:8px"><span class="meta-label">정답</span><span class="meta-value correct">${escapeHtml(String(r.correct))}</span></div>
    <div class="meta-row" style="margin-top:4px"><span class="meta-label">내 선택</span><span class="meta-value ${okCls}">${mD}${r.ok ? ' ✓' : (r.mine ? ' ✗' : '')}</span></div>
  </div>
  <div class="exp-body">
    <section><h4>해석</h4><p>${escapeHtml(exp.interpretation)}</p></section>
    <section><h4>유형·해법</h4><p>${escapeHtml(exp.strategy)}</p></section>
    <section><h4>정답 근거</h4><p>${escapeHtml(exp.correctReasoning)}</p></section>
    ${(exp.wrongReasons && Object.keys(exp.wrongReasons).length) ? `<section><h4>오답 이유</h4><ul>${Object.entries(exp.wrongReasons).map(([k,v]) => `<li><b>(${escapeHtml(k)})</b> ${escapeHtml(v)}</li>`).join('')}</ul></section>` : ''}
  </div>`;
  return h;
}

function toggleExp(i) {
  const row = document.getElementById(`exp-row-${i}`); const btn = document.querySelector(`button.exp-toggle[data-row="${i}"]`);
  if (row.style.display === 'none') { row.style.display=''; btn.classList.add('open'); btn.textContent='▼ 닫기'; }
  else { row.style.display='none'; btn.classList.remove('open'); btn.textContent='▶ 해설'; }
}
function expandAllExp() { document.querySelectorAll('button.exp-toggle').forEach(btn => { const row = document.getElementById(`exp-row-${btn.dataset.row}`); row.style.display=''; btn.classList.add('open'); btn.textContent='▼ 닫기'; }); }
function collapseAllExp() { document.querySelectorAll('button.exp-toggle').forEach(btn => { const row = document.getElementById(`exp-row-${btn.dataset.row}`); row.style.display='none'; btn.classList.remove('open'); btn.textContent='▶ 해설'; }); }

render();
</script>
</body>
</html>
